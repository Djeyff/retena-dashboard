<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
      --border: #2e3248; --border2: #3d4266;
      --text: #f0f2ff; --text2: #9ba3c7; --text3: #6b7499;
      --accent: #E67E22; --accent2: #d4701a;
      --green: #22c55e; --red: #ef4444;
      --radius: 14px; --radius-sm: 9px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .logo img { flex-shrink: 0; }
    .logo-name { font-weight: 700; font-size: 1.5rem; color: var(--accent); }
    .logo-sub { text-align: center; color: var(--text3); font-size: .85rem; margin-bottom: 28px; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      color: var(--text3); border-bottom: 2px solid transparent;
      transition: all .2s; margin-bottom: -1px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Form */
    label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--text2); margin-bottom: 6px; margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%; padding: 12px 14px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: inherit; font-size: .95rem;
      outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text3); }

    /* Button */
    .btn {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
      margin-top: 22px;
    }
    .btn:hover { background: var(--accent2); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Alerts */
    .alert { padding: 11px 14px; border-radius: var(--radius-sm); font-size: .85rem; margin-bottom: 16px; display: none; }
    .alert-err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert-ok  { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3);  color: #86efac; }

    /* Forgot link */
    .forgot { text-align: right; margin-top: 8px; }
    .forgot a { font-size: .78rem; color: var(--text3); text-decoration: none; }
    .forgot a:hover { color: var(--accent); }

    /* Divider to onboarding */
    .alt-action { text-align: center; margin-top: 20px; font-size: .8rem; color: var(--text3); }
    .alt-action a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .alt-action a:hover { text-decoration: underline; }
  </style>
  <meta property="og:image" content="/dashboard/icons/icon-512.png">
  <link rel="icon" href="/dashboard/icons/favicon.ico">
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="/dashboard/icons/logo.svg" alt="Retena" width="30" height="30" style="border-radius:6px">
    <span class="logo-name">Retena</span>
  </div>
  <div class="logo-sub">WhatsApp team memory</div>

  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="auth-error" class="alert alert-err"></div>
  <div id="auth-success" class="alert alert-ok"></div>

  <!-- ── Sign In ── -->
  <div id="form-signin">
    <label>Email</label>
    <input type="email" id="signin-email" placeholder="you@company.com" autocomplete="email">

    <label style="margin-top:14px">Password</label>
    <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doSignIn()">

    <div class="forgot"><a href="#" onclick="doForgot(); return false;">Forgot password?</a></div>
    <button class="btn" id="btn-signin" onclick="doSignIn()">Sign In</button>
  </div>

  <!-- ── Sign Up ── -->
  <div id="form-signup" style="display:none">
    <label>Email</label>
    <input type="email" id="signup-email" placeholder="you@company.com" autocomplete="email">

    <label style="margin-top:14px">Password</label>
    <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password">

    <label style="margin-top:14px">Confirm password</label>
    <input type="password" id="signup-password2" placeholder="Repeat your password" autocomplete="new-password">

    <label style="margin-top:14px">Full name</label>
    <input type="text" id="signup-name" placeholder="Your name">

    <button class="btn" id="btn-signup" onclick="doSignUp()">Create Account</button>
    <div class="alt-action" style="margin-top:14px">
      New user? <a href="/dashboard/onboarding.html">Start with onboarding →</a>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPA_URL  = 'https://mfhdoiddbgpjqjukacnc.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1maGRvaWRkYmdwanFqdWthY25jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjEyNTIsImV4cCI6MjA4ODQzNzI1Mn0.fSL2d0gFjqyFLEPwCrzFI-r49oqCZNJiq4LJS3C0m50';
const supabase = createClient(SUPA_URL, SUPA_ANON);

const { data: { session } } = await supabase.auth.getSession();
if (session) {
  location.href = new URLSearchParams(location.search).get('next') || '/dashboard/';
}

const err = document.getElementById('auth-error');
const ok  = document.getElementById('auth-success');
const showErr = m => { err.textContent = m; err.style.display = 'block'; ok.style.display = 'none'; };
const showOk  = m => { ok.textContent  = m; ok.style.display  = 'block'; err.style.display = 'none'; };
const clear   = () => { err.style.display = 'none'; ok.style.display = 'none'; };

window.switchTab = tab => {
  clear();
  document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
};

window.doSignIn = async () => {
  clear();
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) { showErr('Email and password required'); return; }
  const btn = document.getElementById('btn-signin');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) { showErr(error.message); return; }
  location.href = new URLSearchParams(location.search).get('next') || '/dashboard/';
};

window.doSignUp = async () => {
  clear();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const name     = document.getElementById('signup-name').value.trim();
  if (!email || !password) { showErr('Email and password required'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters'); return; }
  const password2 = document.getElementById('signup-password2').value;
  if (password !== password2) { showErr('Passwords don\'t match'); return; }
  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { data: signUpData, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
  btn.disabled = false; btn.textContent = 'Create Account';
  if (error) { showErr(error.message); return; }
  // Also register in retena_users (for tenant isolation + workspace)
  try {
    await fetch('https://dashboard-api.voz-clara.com/api/onboard/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name, company: '' }),
      credentials: 'include',
    });
  } catch {}
  showOk('Account created! Check your email to confirm, then sign in.');
};

window.doForgot = async () => {
  const email = document.getElementById('signin-email').value.trim();
  if (!email) { showErr('Enter your email first, then click Forgot password.'); return; }
  clear();
  try {
    await fetch('https://dashboard-api.voz-clara.com/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    showOk('If this email exists, a reset link was sent — check your inbox.');
  } catch (e) {
    showErr('Could not send reset email. Try again.');
  }
};
</script>
</body>
</html>

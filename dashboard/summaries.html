<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summaries — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">

      <div class="page-header animate-in">
        <h1 class="page-title">Summaries</h1>
      </div>

      <!-- Controls -->
      <div class="animate-in animate-in-d1" style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <input type="date" class="input" id="summary-date" style="width:auto" onchange="loadSummaries()">
        <div style="display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
          <button class="btn btn-sm summary-toggle active" id="toggle-daily" onclick="setType('daily')" style="border-radius:0;border:none">Daily</button>
          <button class="btn btn-sm summary-toggle" id="toggle-weekly" onclick="setType('weekly')" style="border-radius:0;border:none">Weekly</button>
        </div>
      </div>

      <div id="summaries-content"></div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let summaryType = 'daily';

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('summaries');
  renderMobileTabs('home');
  document.getElementById('summary-date').value = new Date().toISOString().split('T')[0];
  loadSummaries();
});

function setType(type) {
  summaryType = type;
  document.getElementById('toggle-daily').classList.toggle('active', type === 'daily');
  document.getElementById('toggle-weekly').classList.toggle('active', type === 'weekly');
  document.getElementById('toggle-daily').style.background = type === 'daily' ? 'var(--accent)' : 'var(--bg-input)';
  document.getElementById('toggle-daily').style.color = type === 'daily' ? 'white' : 'var(--text-secondary)';
  document.getElementById('toggle-weekly').style.background = type === 'weekly' ? 'var(--accent)' : 'var(--bg-input)';
  document.getElementById('toggle-weekly').style.color = type === 'weekly' ? 'white' : 'var(--text-secondary)';
  loadSummaries();
}

async function loadSummaries() {
  const el = document.getElementById('summaries-content');
  showLoading(el);
  const date = document.getElementById('summary-date').value;
  try {
    const data = await api(`/api/rt/summaries?date=${date}&type=${summaryType}`);
    const items = data.items || data || [];
    if (!items.length) {
      showEmpty(el, 'No summaries for this date', `Try selecting a different date or switch between daily and weekly views.`);
      return;
    }
    el.innerHTML = items.map(s => `
      <div class="card animate-in" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">${s.emoji || '💬'}</span>
            <span style="font-weight:600;font-size:15px">${s.group_name || s.name || 'Group'}</span>
          </div>
          <span style="font-size:12px;color:var(--text-muted)">${s.messages_processed || 0} msgs · ${s.voice_notes || 0} voice · ${s.unique_speakers || 0} speakers</span>
        </div>

        ${s.decisions || s.key_decisions ? `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px">Key Decisions</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${formatList(s.decisions || s.key_decisions)}</div>
        </div>` : ''}

        ${s.action_items ? `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px">Action Items</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${formatList(s.action_items, '☐')}</div>
        </div>` : ''}

        ${s.topics ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          ${(Array.isArray(s.topics) ? s.topics : [s.topics]).map(t => `<span class="pill pill-group">${t}</span>`).join('')}
        </div>` : ''}

        <button class="btn btn-secondary btn-sm" onclick="exportSummary('${s.id || ''}')">📄 Export PDF</button>
      </div>
    `).join('');
  } catch (e) {
    showError(el);
  }
}

function formatList(items, prefix = '•') {
  if (Array.isArray(items)) return items.map(i => `${prefix} ${i}`).join('<br>');
  return items || '';
}

async function exportSummary(id) {
  showToast('Export feature coming soon');
}

// Initialize toggle styles
setType('daily');
</script>
</body>
</html>

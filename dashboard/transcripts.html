<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcripts — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <meta property="og:image" content="/dashboard/icons/icon-512.png">
  <link rel="icon" href="/dashboard/icons/favicon.ico">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">

      <div class="page-header animate-in">
        <h1 class="page-title">Transcripts</h1>
      </div>

      <!-- Filters -->
      <div class="filter-bar animate-in animate-in-d1" id="filter-bar">
        <span class="filter-pill active" data-filter="all" onclick="setTransFilter('all')">All</span>
        <span class="filter-pill" data-filter="personal" onclick="setTransFilter('personal')">Personal</span>
      </div>

      <div id="transcripts-content"></div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allTranscripts = [];
let transFilter = 'all';
let allGroupNames = new Set();

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('transcripts');
  renderMobileTabs('home');
  loadTranscripts();
});

async function loadTranscripts() {
  const el = document.getElementById('transcripts-content');
  showLoading(el);
  try {
    const data = await api('/api/rt/transcripts');
    allTranscripts = data.items || data || [];
    allTranscripts.forEach(t => { if (t.group_name) allGroupNames.add(t.group_name); });
    buildFilterPills();
    renderTranscripts();
  } catch (e) {
    showError(el);
  }
}

function buildFilterPills() {
  const bar = document.getElementById('filter-bar');
  let pills = `<span class="filter-pill active" data-filter="all" onclick="setTransFilter('all')">All</span>`;
  allGroupNames.forEach(name => {
    pills += `<span class="filter-pill" data-filter="${name}" onclick="setTransFilter('${name}')">${name}</span>`;
  });
  pills += `<span class="filter-pill" data-filter="personal" onclick="setTransFilter('personal')">Personal</span>`;
  bar.innerHTML = pills;
}

function setTransFilter(f) {
  transFilter = f;
  document.querySelectorAll('.filter-pill').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  renderTranscripts();
}

function renderTranscripts() {
  const el = document.getElementById('transcripts-content');
  let items = allTranscripts;

  if (transFilter === 'personal') {
    items = items.filter(t => !t.group_name && !t.chat_id);
  } else if (transFilter !== 'all') {
    items = items.filter(t => t.group_name === transFilter);
  }

  if (!items.length) {
    showEmpty(el, 'No transcripts yet', 'Voice notes from your groups and personal inbox will appear here once transcribed.');
    return;
  }

  el.innerHTML = items.map((t, i) => {
    const isPersonal = !t.group_name && !t.chat_id;
    const text = t.transcription || t.text || t.message_text || t.content || '';
    const summary = t.summary || t.summary_json;
    return `
      <div class="card animate-in" style="margin-bottom:10px">
        <div style="display:flex;align-items:flex-start;gap:10px;cursor:pointer" onclick="toggleTranscript(${i})">
          ${t.sender || t.sender_name ? renderAvatar(t.sender || t.sender_name, 'sm') : ''}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
              ${t.sender || t.sender_name ? `<span style="font-weight:600;font-size:13px">${t.sender || t.sender_name}</span>` : ''}
              ${isPersonal ? personalPill() : groupPill(t.group_name || 'Group')}
              <span class="pill pill-voice">🎤 ${formatDuration(t.duration || t.voice_duration_sec || 0)}</span>
              ${t.language_flag || t.language ? `<span style="font-size:13px" title="${t.language || ''}">${t.language_flag || langFlag(t.language)}</span>` : ''}
            </div>
            <div style="font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="preview-${i}">${truncate(text, 120)}</div>
          </div>
          <span class="activity-time" title="${new Date(t.timestamp || t.created_at).toLocaleString()}">${formatTransTime(t.timestamp || t.created_at)}</span>
        </div>
        <div id="expanded-${i}" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          ${summary ? `<div class="summary-card${isPersonal ? ' personal-summary' : ''}" style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px">Summary</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${formatSummaryObj(summary)}</div></div>` : ''}
          <div style="font-size:13px;line-height:1.7;color:var(--text-primary);white-space:pre-wrap">${text}</div>
          <div style="margin-top:10px"><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();navigator.clipboard.writeText(\`${text.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`);showToast('Copied!')">📋 Copy</button></div>
        </div>
      </div>`;
  }).join('');
}

function toggleTranscript(i) {
  const el = document.getElementById(`expanded-${i}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function formatSummaryObj(s) {
  const bullets = [];
  if (typeof s === 'string') {
    s.split(/[•\-\*]|\d+\.\s/).map(b => b.trim()).filter(Boolean).forEach(b => bullets.push(b));
  } else {
    const pts = s.keyPoints || s.key_points || [];
    (Array.isArray(pts) ? pts : [pts]).filter(Boolean).forEach(b => bullets.push(b));
    const acts = s.actionItems || s.action_items || [];
    (Array.isArray(acts) ? acts : [acts]).filter(Boolean).forEach(a => bullets.push('☐ ' + a));
  }
  if (!bullets.length) return typeof s === 'string' ? s : JSON.stringify(s);
  return bullets.map(b => `<div style="display:flex;gap:6px;padding:3px 0"><span style="color:var(--accent);font-weight:700;flex-shrink:0">•</span><span>${b}</span></div>`).join('');
}

function formatTransTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffH = diffMs / 3600000;
  const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  // Today: show "2:30 PM"
  if (d.toDateString() === now.toDateString()) return time;
  // Yesterday: show "Yesterday 2:30 PM"
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return `Yesterday ${time}`;
  // This week: show "Mon 2:30 PM"
  if (diffH < 168) return d.toLocaleDateString([], { weekday: 'short' }) + ' ' + time;
  // Older: show "Mar 15, 2:30 PM"
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' + time;
}

function langFlag(lang) {
  // Fallback only — DB language_flag is country-aware (es→🌐 neutral, real flag from DB)
  const flags = { en:'🇬🇧', es:'🌐', fr:'🇫🇷', de:'🇩🇪', pt:'🇧🇷', it:'🇮🇹', ja:'🇯🇵', zh:'🇨🇳', ar:'🇸🇦', ru:'🇷🇺' };
  if (!lang) return '';
  return flags[lang.slice(0,2).toLowerCase()] || '🌐';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">

      <div class="page-header animate-in">
        <h1 class="page-title">Home</h1>
      </div>

      <!-- Metric Grid -->
      <div class="card-grid animate-in animate-in-d1" id="metrics">
        <div class="metric-card"><div class="metric-value" id="m-groups">0</div><div class="metric-label">Groups Connected</div></div>
        <div class="metric-card"><div class="metric-value" id="m-messages">0</div><div class="metric-label">Messages Captured</div></div>
        <div class="metric-card"><div class="metric-value" id="m-voice">0</div><div class="metric-label">Voice Minutes</div></div>
        <div class="metric-card"><div class="metric-value" id="m-queries">0</div><div class="metric-label">AI Queries</div></div>
      </div>

      <!-- Today's Briefing -->
      <div class="animate-in animate-in-d2">
        <div class="section-title">Today's Briefing</div>
        <div id="briefings"></div>
      </div>

      <!-- Recent Activity -->
      <div class="animate-in animate-in-d3" style="margin-top:24px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="section-title" style="margin-bottom:0">Recent Activity</div>
          <button class="btn btn-secondary btn-sm" onclick="loadHome()">↻ Refresh</button>
        </div>
        <div id="activity"></div>
      </div>

      <!-- VozClara Tip -->
      <div class="tip-card animate-in animate-in-d4" id="vc-tip" style="margin-top:24px">
        <span>🎤</span>
        <span>Personal voice note? Retena captures groups. For 1-on-1 voice notes, use <a href="https://voz-clara.com" target="_blank" style="color:var(--accent)">VozClara</a> — free for all Retena members.</span>
        <span class="tip-dismiss" onclick="document.getElementById('vc-tip').style.display='none';localStorage.setItem('vc-tip-dismissed','1')">✕</span>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script>
  // Redirect to user's preferred landing page (before anything loads)
  (function() {
    const landing = localStorage.getItem('retena_landing');
    if (landing && window.location.pathname !== landing) {
      window.location.replace(landing);
    }
  })();
</script>
<script src="/dashboard/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('home');
  renderMobileTabs('home');
  if (localStorage.getItem('vc-tip-dismissed')) document.getElementById('vc-tip').style.display = 'none';
  loadHome();
});

async function loadHome() {
  showLoading(document.getElementById('briefings'));
  showLoading(document.getElementById('activity'));

  try {
    const data = await api('/api/rt/home');
    renderMetrics(data.metrics || {});
    renderBriefings(data.briefings || []);
    renderActivity(data.recentActivity || data.recent_activity || []);
  } catch (e) {
    renderMetrics({});
    showEmpty(document.getElementById('briefings'), 'No activity yet', "Add Retena's number to a WhatsApp group to start capturing messages.", { label: 'Connect your first group →', href: '/dashboard/groups.html' });
    showEmpty(document.getElementById('activity'), 'No recent activity', 'Messages will appear here once your groups are active.');
  }
}

function renderMetrics(m) {
  document.getElementById('m-groups').textContent = m.groups || 0;
  document.getElementById('m-messages').textContent = m.messages || 0;
  document.getElementById('m-voice').textContent = m.voice_minutes ? `${m.voice_minutes} min` : '0';
  document.getElementById('m-queries').textContent = m.ai_queries || 0;
}

function renderBriefings(items) {
  const el = document.getElementById('briefings');
  if (!items.length) {
    showEmpty(el, 'No activity yet', "Add Retena's number to a WhatsApp group to start capturing messages.", { label: 'Connect your first group →', href: '/dashboard/groups.html' });
    return;
  }
  el.innerHTML = items.map(b => `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">${b.emoji || '💬'}</span>
          <span style="font-weight:600">${b.name || b.group_name || 'Group'}</span>
        </div>
        <span style="font-size:12px;color:var(--text-muted)">${b.messages || 0} msgs · ${b.voice_notes || 0} voice</span>
      </div>
      ${b.decisions ? `<div style="margin-bottom:6px;font-size:13px;color:var(--text-secondary)"><strong>Key decisions:</strong> ${Array.isArray(b.decisions) ? b.decisions.map(d=>'• '+d).join(' ') : b.decisions}</div>` : ''}
      ${b.action_items ? `<div style="font-size:13px;color:var(--text-secondary)"><strong>Action items:</strong> ${Array.isArray(b.action_items) ? b.action_items.map(a=>'☐ '+a).join(' ') : b.action_items}</div>` : ''}
      <a href="/dashboard/groups.html" style="font-size:12px;color:var(--accent);margin-top:8px;display:inline-block">View full summary →</a>
    </div>
  `).join('');
}

function renderActivity(items) {
  const el = document.getElementById('activity');
  if (!items.length) {
    showEmpty(el, 'No recent activity', 'Messages will appear here once your groups are active.');
    return;
  }
  el.innerHTML = items.map(a => `
    <div class="activity-item">
      ${renderAvatar(a.sender || a.sender_name || 'Unknown')}
      <div class="activity-content">
        <div class="activity-meta">
          <span class="activity-sender">${a.sender || a.sender_name || 'Unknown'}</span>
          ${a.group_name ? groupPill(a.group_name) : ''}
          <span class="activity-time">${timeAgo(a.timestamp || a.created_at)}</span>
        </div>
        <div class="activity-text">
          ${a.message_type === 'voice' || a.type === 'voice' ? `<span class="voice-badge">🎤 ${formatDuration(a.duration || a.voice_duration_sec || 0)}</span> ` : ''}
          ${truncate(a.text || a.message_text || a.content || a.transcription || '', 200)}
        </div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>

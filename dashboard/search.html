<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Search — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <meta property="og:image" content="/dashboard/icons/icon-512.png">
  <link rel="icon" href="/dashboard/icons/favicon.ico">
  <style>
    .search-box{position:relative;max-width:560px;margin:0 auto}
    .search-box input{padding-left:44px;padding-right:80px;height:48px;font-size:15px;border-radius:14px;background:var(--card-bg);border:1px solid var(--border);width:100%}
    .search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,126,34,.15)}
    .search-box .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
    .search-box .s-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:6px 14px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}
    .search-box .s-btn:hover{background:#d35400}
    .ai-card{background:linear-gradient(135deg,rgba(230,126,34,.08),rgba(230,126,34,.03));border:1px solid rgba(230,126,34,.2);border-radius:14px;padding:20px;margin:20px 0}
    .ai-card .ai-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
    .ai-card .ai-text{font-size:14px;line-height:1.7;color:var(--text-primary)}
    .ai-card .ai-meta{margin-top:12px;font-size:11px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap}
    .source-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
    .source-card:hover{border-color:var(--accent);background:rgba(230,126,34,.04)}
    .source-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .source-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
    .source-text mark{background:rgba(230,126,34,.2);color:var(--text-primary);border-radius:2px;padding:0 2px}
    .history-section{margin-top:36px}
    .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .history-header h3{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
    .history-clear{font-size:12px;color:var(--text-muted);cursor:pointer;border:none;background:none;padding:4px 8px;border-radius:6px}
    .history-clear:hover{color:var(--accent);background:rgba(230,126,34,.08)}
    .history-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;transition:background .15s}
    .history-item:hover{background:var(--card-bg)}
    .history-icon{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:var(--card-bg);display:flex;align-items:center;justify-content:center}
    .history-content{flex:1;min-width:0}
    .history-query{font-size:14px;font-weight:500;color:var(--text-primary)}
    .history-answer{font-size:12px;color:var(--text-muted);line-height:1.4;margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .history-time{flex-shrink:0;font-size:11px;color:var(--text-muted);margin-top:2px}
    .history-cached{font-size:10px;color:var(--accent);font-weight:600;margin-left:6px}
    .stats-row{display:flex;gap:16px;justify-content:center;margin:12px 0 20px;flex-wrap:wrap}
    .stats-row .stat{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
    .stats-row .stat svg{opacity:.5}
    .lang-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .lang-pill{font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(230,126,34,.1);color:var(--accent);font-weight:500}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
    .suggestion-chip{font-size:12px;padding:6px 14px;border-radius:20px;background:var(--card-bg);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;transition:all .15s}
    .suggestion-chip:hover{border-color:var(--accent);color:var(--accent)}
    .empty-search{text-align:center;padding:40px 20px}
    .empty-search svg{opacity:.15;margin-bottom:16px}
    .empty-search h3{font-size:16px;font-weight:600;margin-bottom:6px}
    .empty-search p{font-size:13px;color:var(--text-muted)}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content" style="max-width:680px">

      <div class="page-header animate-in">
        <h1 class="page-title" style="display:flex;align-items:center;gap:10px">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          AI Search
        </h1>
      </div>

      <!-- Search Box -->
      <div class="search-box animate-in animate-in-d1">
        <svg class="s-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" placeholder="Search in any language…" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="s-btn" onclick="doSearch()">Search</button>
      </div>

      <!-- Stats Row -->
      <div class="stats-row animate-in animate-in-d1">
        <span class="stat" id="usage-counter">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span id="usage-text">—</span>
        </span>
        <span class="stat">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Cross-language
        </span>
      </div>

      <!-- Suggestions (shown when no results) -->
      <div id="suggestions" class="animate-in animate-in-d2">
        <div class="suggestions">
          <span class="suggestion-chip" onclick="setQuery('budget')">💰 budget</span>
          <span class="suggestion-chip" onclick="setQuery('meeting')">📅 meeting</span>
          <span class="suggestion-chip" onclick="setQuery('delivery')">📦 delivery</span>
          <span class="suggestion-chip" onclick="setQuery('payment')">💳 payment</span>
          <span class="suggestion-chip" onclick="setQuery('schedule')">🗓️ schedule</span>
          <span class="suggestion-chip" onclick="setQuery('materials')">🧱 materials</span>
        </div>
      </div>

      <!-- Results Container -->
      <div id="search-results" style="display:none">
        <!-- AI Answer -->
        <div id="ai-answer"></div>
        <!-- Cross-language indicator -->
        <div id="search-langs" style="display:none"></div>
        <!-- Sources -->
        <div id="sources-header" style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px">
          <span style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">Sources</span>
          <span id="source-count" style="font-size:11px;color:var(--text-muted)"></span>
        </div>
        <div id="sources"></div>
      </div>

      <!-- Loading -->
      <div id="search-loading" style="display:none;text-align:center;padding:48px 20px">
        <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div>
        <div style="margin-top:16px;font-size:13px;color:var(--text-muted)">Searching across all languages…</div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>

      <!-- Error -->
      <div id="search-error" style="display:none"></div>

      <!-- Search History -->
      <div id="search-history" class="history-section animate-in animate-in-d3"></div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
const esc = t => (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('search');
  renderMobileTabs('search');
  loadUsageCounter();
  loadSearchHistory();

  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('search-input').value = params.get('q');
    doSearch();
  }
});

async function loadUsageCounter() {
  try {
    const data = await api('/api/rt/usage');
    const plan = PLAN_LIMITS[data.plan || 'starter'];
    const used = data.ai_queries?.used ?? (typeof data.ai_queries === 'number' ? data.ai_queries : 0);
    const limit = data.ai_queries?.limit ?? plan.ai_queries;
    const total = limit === Infinity ? '∞' : limit;
    document.getElementById('usage-text').textContent = `${used} / ${total} queries`;
  } catch (e) {}
}

function setQuery(q) {
  document.getElementById('search-input').value = q;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-error').style.display = 'none';
  document.getElementById('search-loading').style.display = 'block';

  try {
    const t0 = Date.now();
    const data = await api('/api/rt/search', {
      method: 'POST',
      body: JSON.stringify({ query })
    });
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

    document.getElementById('search-loading').style.display = 'none';

    if (!data.answer && (!data.sources || !data.sources.length)) {
      document.getElementById('search-error').style.display = 'block';
      document.getElementById('search-error').innerHTML = `
        <div class="empty-search">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <h3>No results for "${esc(query)}"</h3>
          <p>Try different words, another language, or a broader search.</p>
        </div>`;
      loadSearchHistory();
      return;
    }

    document.getElementById('search-results').style.display = 'block';

    // AI Answer Card
    const answerEl = document.getElementById('ai-answer');
    if (data.answer) {
      answerEl.innerHTML = `
        <div class="ai-card">
          <div class="ai-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            AI Answer ${data.cached ? '<span style="opacity:.6">· cached</span>' : ''}
          </div>
          <div class="ai-text">${esc(data.answer)}</div>
          <div class="ai-meta">
            <span>⏱ ${elapsed}s</span>
            ${data.search_terms ? '<span>🌐 ' + data.search_terms.slice(0,6).map(t => esc(t)).join(', ') + '</span>' : ''}
          </div>
        </div>`;
    } else {
      answerEl.innerHTML = '';
    }

    // Sources
    const sourcesEl = document.getElementById('sources');
    const sources = Array.isArray(data.sources) ? data.sources : (typeof data.sources === 'string' ? JSON.parse(data.sources) : []);
    document.getElementById('source-count').textContent = sources.length + ' message' + (sources.length !== 1 ? 's' : '');

    if (sources.length) {
      sourcesEl.innerHTML = sources.map(s => {
        try {
          const isPersonal = !s.group_name || (s.is_group === false);
          const chatId = s.chat_id || s.group_id || '';
          const deepLink = isPersonal
            ? '/dashboard/personal.html?chat=' + encodeURIComponent(chatId)
            : '/dashboard/groups.html?group=' + encodeURIComponent(chatId);
          const senderName = esc(s.sender || s.sender_name || 'Unknown');
          const rawText = s.text || s.message_text || s.content || s.transcription || '';
          const msgText = esc(truncate(rawText, 200));
          return `
            <div class="source-card" onclick="location.href='${deepLink}'">
              <div class="source-header">
                ${renderAvatar(s.sender || s.sender_name || 'Unknown', 'sm')}
                <span style="font-weight:600;font-size:13px">${senderName}</span>
                ${isPersonal ? personalPill() : groupPill(esc(s.group_name || 'Group'))}
                <span class="activity-time" style="margin-left:auto">${timeAgo(s.timestamp || s.created_at)}</span>
              </div>
              <div class="source-text">${msgText}</div>
            </div>`;
        } catch (err) { return ''; }
      }).join('');
    } else {
      sourcesEl.innerHTML = '<div style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px">No specific sources found</div>';
    }

    loadUsageCounter();
    loadSearchHistory();
  } catch (e) {
    document.getElementById('search-loading').style.display = 'none';
    document.getElementById('search-error').style.display = 'block';
    document.getElementById('search-error').innerHTML = `
      <div class="empty-search">
        <h3>Something went wrong</h3>
        <p>Check your connection and try again.</p>
        <button class="btn btn-secondary" style="margin-top:12px" onclick="doSearch()">Retry</button>
      </div>`;
  }
}

async function loadSearchHistory() {
  try {
    const data = await api('/api/rt/search/history?limit=20');
    const history = data.history || [];
    const el = document.getElementById('search-history');
    if (!history.length) { el.innerHTML = ''; return; }
    window._searchHistory = history;
    el.innerHTML = `
      <div class="history-header">
        <h3>Search History</h3>
        <button class="history-clear" onclick="clearHistory()">Clear all</button>
      </div>
      ${history.map((h, idx) => `
        <div class="history-item" onclick="replaySearch(${idx})">
          <div class="history-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <div class="history-content">
            <div class="history-query">${esc(h.query)}</div>
            ${h.answer ? `<div class="history-answer">${esc(h.answer)}</div>` : '<div class="history-answer" style="font-style:italic">No results</div>'}
          </div>
          <div class="history-time">${timeAgo(h.created_at)}</div>
        </div>
      `).join('')}
    `;
  } catch (e) { console.error('History error:', e); }
}

function replaySearch(idx) {
  const h = window._searchHistory?.[idx];
  if (!h) return;
  document.getElementById('search-input').value = h.query;
  doSearch();
}

async function clearHistory() {
  if (!confirm('Clear all search history?')) return;
  try {
    await api('/api/rt/search/history', { method: 'DELETE' });
    document.getElementById('search-history').innerHTML = '';
    window._searchHistory = [];
  } catch (e) {
    // If DELETE not implemented yet, just clear UI
    document.getElementById('search-history').innerHTML = '';
    window._searchHistory = [];
  }
}
</script>
</body>
</html>

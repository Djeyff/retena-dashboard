<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Search — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <meta property="og:image" content="/dashboard/icons/icon-512.png">
  <link rel="icon" href="/dashboard/icons/favicon.ico">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content" style="max-width:700px">

      <div class="page-header animate-in">
        <h1 class="page-title">AI Search</h1>
      </div>

      <!-- Search Input -->
      <div class="search-input-wrapper animate-in animate-in-d1">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="input" id="search-input" placeholder="What did we decide about the bathroom tiles budget?" onkeydown="if(event.key==='Enter')doSearch()">
      </div>

      <div style="text-align:center;font-size:12px;color:var(--text-muted);margin:8px 0 16px" class="animate-in animate-in-d1">
        Search in any language — finds messages in groups AND personal notes
      </div>

      <!-- Usage Counter -->
      <div style="text-align:center;margin-bottom:24px" class="animate-in animate-in-d2">
        <span id="usage-counter" style="font-size:12px;color:var(--text-muted)"></span>
      </div>

      <!-- Example Queries -->
      <div id="examples" class="animate-in animate-in-d2">
        <div class="section-title" style="text-align:center">Try searching</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
          <button class="btn btn-secondary btn-sm" onclick="setQuery('What did we decide about the bathroom tiles budget?')">Bathroom tiles budget</button>
          <button class="btn btn-secondary btn-sm" onclick="setQuery('Budget discussions from last week')">Budget last week</button>
          <button class="btn btn-secondary btn-sm" onclick="setQuery('mom medical')">mom medical</button>
          <button class="btn btn-secondary btn-sm" onclick="setQuery('When is the client meeting?')">Client meeting</button>
        </div>
      </div>

      <!-- Results -->
      <div id="search-results" style="display:none">
        <div id="ai-answer"></div>
        <div class="section-title" style="margin-top:24px">Sources</div>
        <div id="sources"></div>
      </div>

      <!-- Loading -->
      <div id="search-loading" style="display:none;text-align:center;padding:40px">
        <div class="skeleton-line w-80" style="margin:0 auto"></div>
        <div class="skeleton-line w-60" style="margin:8px auto 0"></div>
        <div class="skeleton-line w-40" style="margin:8px auto 0"></div>
        <div style="margin-top:16px;font-size:13px;color:var(--text-muted)">Searching across all your groups and notes…</div>
      </div>

      <!-- Error -->
      <div id="search-error" style="display:none"></div>

      <!-- Search History -->
      <div id="search-history" class="animate-in animate-in-d3" style="margin-top:32px"></div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('search');
  renderMobileTabs('search');
  loadUsageCounter();
  loadSearchHistory();

  // Auto-search from URL param
  const params = new URLSearchParams(location.search);
  if (params.get('q')) {
    document.getElementById('search-input').value = params.get('q');
    doSearch();
  }
});

async function loadUsageCounter() {
  try {
    const data = await api('/api/rt/usage');
    const plan = PLAN_LIMITS[data.plan || 'starter'];
    const used = data.ai_queries?.used ?? (typeof data.ai_queries === 'number' ? data.ai_queries : 0);
    const limit = data.ai_queries?.limit ?? plan.ai_queries;
    const total = limit === Infinity ? '∞' : limit;
    document.getElementById('usage-counter').textContent = `${used} of ${total} AI queries this month`;
  } catch (e) {}
}

function setQuery(q) {
  document.getElementById('search-input').value = q;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  document.getElementById('examples').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-error').style.display = 'none';
  document.getElementById('search-loading').style.display = 'block';

  try {
    const data = await api('/api/rt/search', {
      method: 'POST',
      body: JSON.stringify({ query })
    });

    document.getElementById('search-loading').style.display = 'none';

    if (!data.answer && (!data.sources || !data.sources.length)) {
      document.getElementById('search-error').style.display = 'block';
      document.getElementById('search-error').innerHTML = `<div class="empty-state"><h3>No results found</h3><p>Try a different query or check your spelling.</p></div>`;
      return;
    }

    document.getElementById('search-results').style.display = 'block';

    // AI Answer
    const answerEl = document.getElementById('ai-answer');
    if (data.answer) {
      answerEl.innerHTML = `<div class="ai-answer"><p>${data.answer}</p></div>`;
    } else {
      answerEl.innerHTML = '';
    }

    // Sources
    const sourcesEl = document.getElementById('sources');
    const sources = data.sources || [];
    if (sources.length) {
      sourcesEl.innerHTML = sources.map(s => {
        const isPersonal = !s.group_name || (s.is_group === false);
        const chatId = s.chat_id || s.group_id || '';
        const deepLink = isPersonal
          ? '/dashboard/personal.html?chat=' + encodeURIComponent(chatId)
          : '/dashboard/groups.html?group=' + encodeURIComponent(chatId);
        return `
          <div class="card" style="margin-bottom:10px;cursor:pointer" onclick="location.href='${deepLink}'">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              ${renderAvatar(s.sender || s.sender_name || 'Unknown', 'sm')}
              <span style="font-weight:600;font-size:13px">${s.sender || s.sender_name || 'Unknown'}</span>
              ${isPersonal ? personalPill() : groupPill(s.group_name || 'Group')}
              <span class="activity-time">${timeAgo(s.timestamp || s.created_at)}</span>
            </div>
            <div style="font-size:13px;color:var(--text-secondary);line-height:1.5">${truncate(s.text || s.message_text || s.content || s.transcription || '', 250)}</div>
          </div>`;
      }).join('');
    } else {
      sourcesEl.innerHTML = '<div style="font-size:13px;color:var(--text-muted)">No specific sources found</div>';
    }

    loadUsageCounter();
    loadSearchHistory();
  } catch (e) {
    document.getElementById('search-loading').style.display = 'none';
    document.getElementById('search-error').style.display = 'block';
    document.getElementById('search-error').innerHTML = `<div class="error-state"><p>Something went wrong. Try refreshing.</p><button class="btn btn-secondary" onclick="doSearch()">Retry</button></div>`;
  }
}

async function loadSearchHistory() {
  try {
    const data = await api('/api/rt/search/history?limit=20');
    const history = data.history || [];
    const el = document.getElementById('search-history');
    if (!history.length) { el.innerHTML = ''; return; }
    window._searchHistory = history;
    el.innerHTML = `
      <div class="section-title">Recent Searches</div>
      ${history.map((h, idx) => `
        <div class="card" style="margin-bottom:8px;cursor:pointer;padding:12px 16px" onclick="replaySearch(${idx})" title="${new Date(h.created_at).toLocaleString()}">
          <div style="display:flex;align-items:center;gap:10px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span style="font-size:13px;font-weight:500;flex:1">${h.query.replace(/</g,'&lt;')}</span>
            <span class="activity-time">${timeAgo(h.created_at)}</span>
          </div>
          ${h.answer ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.4">${truncate(h.answer, 120).replace(/</g,'&lt;')}</div>` : ''}
        </div>
      `).join('')}
    `;
  } catch (e) { console.error('Search history error:', e); }
}

function replaySearch(idx) {
  const h = window._searchHistory?.[idx];
  if (!h) return;
  document.getElementById('search-input').value = h.query;
  doSearch();
}
</script>
</body>
</html>

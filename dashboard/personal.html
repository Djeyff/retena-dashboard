<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Inbox — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <style>
    /* ── Chat Layout ── */
    .two-panel { display: flex; height: calc(100vh - 60px); overflow: hidden; }
    .panel-left { width: 340px; min-width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Conversation List ── */
    .conv-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .conv-item:hover { background: rgba(230,126,34,0.04); }
    .conv-item.selected { background: rgba(230,126,34,0.08); border-left: 3px solid var(--accent); }
    .conv-preview { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .conv-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
    .conv-name { font-weight: 600; font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .conv-badge { font-size: 10px; color: var(--text-muted); }
    .conv-unread { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 10px; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }

    /* ── Chat Header ── */
    .chat-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-sidebar); }
    .chat-header-name { font-weight: 700; font-size: 15px; }
    .chat-header-meta { font-size: 12px; color: var(--text-muted); }

    /* ── Chat Thread ── */
    .chat-thread { display: flex; flex-direction: column; padding: 16px 20px; overflow-y: auto; flex: 1; gap: 2px; }
    .chat-date-divider { text-align: center; font-size: 11px; color: var(--text-muted); padding: 16px 0 8px; position: relative; }
    .chat-date-divider::before, .chat-date-divider::after { content: ''; position: absolute; top: 55%; width: 30%; height: 1px; background: var(--border); }
    .chat-date-divider::before { left: 5%; }
    .chat-date-divider::after { right: 5%; }

    /* ── Message Bubbles (WhatsApp-style) ── */
    .msg-row { display: flex; margin-bottom: 2px; }
    .msg-row.me { justify-content: flex-end; }
    .msg-row.them { justify-content: flex-start; }
    .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.55; position: relative; word-wrap: break-word; }
    .msg-bubble.me { background: rgba(230,126,34,0.10); border: 1px solid rgba(230,126,34,0.18); border-bottom-right-radius: 4px; }
    .msg-bubble.them { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-bubble-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .msg-bubble.me .msg-bubble-time { justify-content: flex-end; }
    .msg-bubble-text { white-space: pre-wrap; }

    /* ── Voice Badge ── */
    .voice-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); margin-bottom: 4px; }

    /* ── Summary Block ── */
    .msg-summary { border-left: 3px solid var(--accent); background: rgba(230,126,34,0.06); border-radius: 0 8px 8px 0; padding: 8px 10px; margin: 6px 0 4px; }
    .msg-summary-title { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .msg-summary .bullet { display: flex; gap: 6px; padding: 2px 0; font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .msg-summary .bullet::before { content: '•'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

    /* ── Translate ── */
    .translate-toggle { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); cursor: pointer; margin-top: 4px; user-select: none; }
    .translate-toggle:hover { color: var(--accent); }
    .translate-panel { display: none; align-items: center; gap: 6px; margin-top: 6px; }
    .translate-panel.open { display: flex; flex-wrap: wrap; }
    .translate-panel select { background: var(--bg-sidebar); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 11px; font-family: inherit; }
    .lang-picker { position: relative; display: inline-block; }
    .lang-picker-btn { background: var(--bg-sidebar); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; min-width: 120px; text-align: left; font-family: inherit; }
    .lang-picker-drop { display: none; position: absolute; bottom: 100%; left: 0; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 8px; width: 220px; max-height: 260px; overflow: hidden; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.3); flex-direction: column; margin-bottom: 4px; }
    .lang-picker-drop.open { display: flex; }
    .lang-picker-search { background: var(--bg-main); color: var(--text-primary); border: none; border-bottom: 1px solid var(--border); padding: 8px 10px; font-size: 12px; outline: none; font-family: inherit; }
    .lang-picker-list { overflow-y: auto; max-height: 220px; }
    .lang-picker-item { padding: 6px 10px; font-size: 11px; cursor: pointer; color: var(--text-secondary); }
    .lang-picker-item:hover { background: rgba(230,126,34,0.15); color: var(--text-primary); }
    .lang-picker-item.selected { background: rgba(230,126,34,0.1); font-weight: 600; }
    .translate-panel .btn-translate { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: rgba(230,126,34,0.15); color: var(--accent); border: none; cursor: pointer; font-weight: 600; }
    .translate-panel .btn-translate:hover { background: rgba(230,126,34,0.25); }
    .translation-result { margin-top: 6px; padding: 8px 10px; border-left: 3px solid #60a5fa; background: rgba(59,130,246,0.06); border-radius: 0 8px 8px 0; font-size: 12px; color: var(--text-primary); line-height: 1.5; white-space: pre-wrap; }

    /* ── Empty State ── */
    .panel-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 12px; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .two-panel { flex-direction: column; }
      .panel-left { width: 100%; border-right: none; }
      .panel-right { width: 100%; }
      .hidden-mobile { display: none !important; }
      .msg-bubble { max-width: 88%; }
      #back-btn { display: inline-flex !important; }
    }
    @media (min-width: 769px) {
      #back-btn { display: none !important; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content two-panel">

      <!-- Left: Conversation List -->
      <div class="panel-left" id="panel-left">
        <div style="padding: 16px 16px 8px;">
          <h2 style="font-size: 18px; font-weight: 700; margin: 0 0 10px;">Chats</h2>
          <input class="input" placeholder="Search contacts…" id="conv-search" oninput="filterConversations()" style="font-size: 13px;">
        </div>
        <div id="conv-list" style="overflow-y: auto; flex: 1;"></div>
      </div>

      <!-- Right: Chat Thread -->
      <div class="panel-right hidden-mobile" id="panel-right">
        <div class="panel-empty" id="chat-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <p>Select a conversation</p>
        </div>
        <div class="chat-header" id="chat-header" style="display:none">
          <button class="btn btn-secondary btn-sm" id="back-btn" onclick="backToList()">←</button>
          <div id="chat-avatar"></div>
          <div>
            <div class="chat-header-name" id="chat-name"></div>
            <div class="chat-header-meta" id="chat-meta"></div>
          </div>
        </div>
        <div class="chat-thread" id="chat-thread" style="display:none"></div>
        <!-- Open in WhatsApp — links directly to this conversation -->
        <div id="chat-wa-bar" style="display:none;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg-sidebar)">
          <a id="chat-wa-link" href="#" target="_blank" rel="noopener"
             style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border-radius:10px;background:#25D366;color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s"
             onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Continue in WhatsApp
          </a>
          <div id="brave-wa-tip" style="display:none;margin-top:6px;padding:8px 10px;background:rgba(230,126,34,0.1);border-radius:8px;font-size:11px;color:var(--text-muted);line-height:1.4">
            ⚠️ <b>Brave users:</b> If WhatsApp doesn't open, <a href="brave://settings/shields" style="color:inherit;text-decoration:underline;font-weight:600">open Brave Settings</a> → Brave Shields &amp; Privacy → Allow app links to open in apps outside of Brave
            <span onclick="localStorage.setItem('brave_wa_tip_dismissed','1');this.parentElement.style.display='none'" style="cursor:pointer;float:right;font-size:13px">✕</span>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
// ── State ──
let allMessages = [];
let conversations = [];
let selectedChatId = null;

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('personal');
  renderMobileTabs('personal');
  loadPersonal();
});

// ── Background poll handler ──
window.addEventListener('retena:newData', async (e) => {
  if (!e.detail?.hasNew) return;
  // Refresh conversation list (unread counts, last message preview)
  try {
    let data;
    data = await api('/api/rt/personal?limit=200');
    
    if (data?.conversations?.length) {
      conversations = data.conversations;
      renderConversationList(document.getElementById('conv-search')?.value?.toLowerCase() || '');
    }
  } catch (e) { /* silent */ }

  // If a chat is open, fetch only new messages for that chat
  if (!selectedChatId) return;
  try {
    const lastTs = allMessages
      .filter(m => m.chat_id === selectedChatId)
      .reduce((max, m) => (m.timestamp > max ? m.timestamp : max), '');
    const since = lastTs ? `&since=${encodeURIComponent(lastTs)}` : '';
    let data;
    try { data = await api(`/api/rt/personal?chat=${encodeURIComponent(selectedChatId)}&limit=50${since}`); }
    catch { data = await api(`/api/rt/personal?chat=${encodeURIComponent(selectedChatId)}&limit=50${since}`); }

    const newMsgs = (data?.items || []).filter(m => !allMessages.find(x => x.id === m.id));
    if (!newMsgs.length) return;

    // Merge into cache
    const existingIds = new Set(allMessages.map(m => m.id));
    for (const m of newMsgs) { if (!existingIds.has(m.id)) { allMessages.push(m); existingIds.add(m.id); } }

    // Smart-append: preserve scroll if user is reading history
    const thread = document.getElementById('chat-thread');
    if (!thread) return;
    const wasAtBottom = thread.scrollHeight - thread.scrollTop - thread.clientHeight < 60;

    // Append new message bubbles
    newMsgs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    newMsgs.forEach((m, idx) => {
      const wrap = document.createElement('div');
      wrap.innerHTML = renderSingleBubble(m, idx);
      while (wrap.firstChild) thread.appendChild(wrap.firstChild);
    });

    if (wasAtBottom) {
      thread.scrollTop = thread.scrollHeight;
    } else {
      showNewMsgBadge(thread, newMsgs.length, () => { thread.scrollTop = thread.scrollHeight; });
    }
  } catch (e) { /* silent */ }
});

// ── Realtime: voice note transcription arrived (UPDATE event) ──
window.addEventListener('retena:transcribed', (e) => {
  const m = e.detail;
  if (!m?.id || !m?.transcription) return;
  const card = document.getElementById(`card-${m.id}`);
  if (!card) return;
  // Replace the "no transcription" placeholder with actual transcription
  const placeholder = card.querySelector('[style*="font-style:italic"]');
  if (placeholder) {
    const div = document.createElement('div');
    div.className = 'msg-bubble-text';
    div.textContent = m.transcription;
    placeholder.replaceWith(div);
  }
  // Update in allMessages cache
  const cached = allMessages.find(x => x.id === m.id);
  if (cached) cached.transcription = m.transcription;
});

// ── Load Data ──
async function loadPersonal() {
  showLoading(document.getElementById('conv-list'));
  try {
    // Try the new endpoint first (returns chat_id, from_me, conversations)
    let data;
    try {
      data = await api('/api/rt/personal');
    } catch (e1) {
      // Fallback to old endpoint
      data = await api('/api/rt/personal');
    }
    allMessages = data.items || [];
    conversations = data.conversations || buildConversations(allMessages);
    renderConversationList();
  } catch (e) {
    document.getElementById('conv-list').innerHTML = `
      <div class="panel-empty" style="padding:40px 20px">
        <p>Could not load messages</p>
        <p style="font-size:12px;color:var(--text-muted)">${e.message}</p>
      </div>`;
  }
}

// ── Fallback: build conversations client-side if API doesn't return them ──
function buildConversations(messages) {
  const map = {};
  for (const m of messages) {
    const cid = m.chat_id;
    if (!cid || cid === 'status@broadcast') continue;
    if (!map[cid]) {
      map[cid] = {
        chat_id: cid,
        contact_name: null,
        last_message: m,
        message_count: 0,
        voice_count: 0,
        text_count: 0,
      };
    }
    if (!m.from_me && m.sender_name) {
      map[cid].contact_name = m.sender_name;
    } else if (m.from_me && m.chat_name) {
      // For sent messages, use resolved chat_name (contact name from retena_contacts)
      if (!map[cid].contact_name || map[cid].contact_name === cid.replace(/@.*/, '')) {
        map[cid].contact_name = m.chat_name;
      }
    }
    map[cid].message_count++;
    if (m.message_type === 'voice' || m.message_type === 'audio') map[cid].voice_count++;
    else map[cid].text_count++;
  }
  // Resolve missing contact names
  for (const c of Object.values(map)) {
    if (!c.contact_name) {
      const phone = c.chat_id.replace(/@.*/, '');
      c.contact_name = phone;
    }
  }
  return Object.values(map).sort((a, b) =>
    new Date(b.last_message.timestamp || b.last_message.created_at) -
    new Date(a.last_message.timestamp || a.last_message.created_at)
  );
}

// ── Filter ──
function filterConversations() {
  const q = document.getElementById('conv-search').value.toLowerCase();
  renderConversationList(q);
}

// ── Render Conversation List ──
function renderConversationList(filter = '') {
  const el = document.getElementById('conv-list');
  let convs = conversations;
  if (filter) {
    convs = convs.filter(c => (c.contact_name || '').toLowerCase().includes(filter));
  }

  if (!convs.length) {
    el.innerHTML = `<div class="panel-empty" style="padding:40px 20px"><p>No conversations found</p></div>`;
    return;
  }

  el.innerHTML = convs.map(c => {
    const last = c.last_message;
    const text = last.transcription || last.text_content || last.text || last.body || last.content || '';
    const isVoice = last.message_type === 'voice' || last.message_type === 'audio';
    const prefix = last.from_me ? '<span style="color:var(--text-muted)">You: </span>' : '';
    const voiceIcon = isVoice ? '🎤 ' : '';
    const t = timeAgo(last.timestamp || last.created_at);
    const sel = selectedChatId === c.chat_id ? ' selected' : '';

    return `
      <div class="conv-item${sel}" onclick="selectConversation('${c.chat_id}')">
        ${renderAvatar(c.contact_name)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
            <span class="conv-name">${esc(c.contact_name)}</span>
            <span class="conv-time">${t}</span>
          </div>
          <div class="conv-preview">${prefix}${voiceIcon}${esc(truncate(text, 45))}</div>
          <div class="conv-meta">
            <span class="conv-badge">${c.message_count} msg${c.message_count !== 1 ? 's' : ''}</span>
            ${c.voice_count ? `<span class="conv-badge">🎤 ${c.voice_count}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Select Conversation ──
async function selectConversation(chatId) {
  selectedChatId = chatId;
  renderConversationList(document.getElementById('conv-search').value.toLowerCase());

  const conv = conversations.find(c => c.chat_id === chatId);
  if (!conv) return;

  // Mobile: swap panels
  document.getElementById('panel-left').classList.add('hidden-mobile');
  document.getElementById('panel-right').classList.remove('hidden-mobile');
  document.getElementById('chat-empty').style.display = 'none';

  // Show header
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('chat-avatar').innerHTML = renderAvatar(conv.contact_name, 'lg');
  document.getElementById('chat-name').textContent = conv.contact_name;
  document.getElementById('chat-meta').textContent =
    `${conv.message_count} messages · ${conv.voice_count} voice · ${conv.text_count} text`;

  // WhatsApp deep link — iframe trick: fires custom scheme without navigating the page
  // Fallback: wa.me (works in all browsers including Brave)
  const waBar = document.getElementById('chat-wa-bar');
  const waLink = document.getElementById('chat-wa-link');
  // Use real_phone (resolves @lid → actual number), fallback to chat_id digits
  // Never use raw LID numbers (>14 digits) — they're WhatsApp internal IDs, not real phones
  const isLid = (conv.chat_id || '').endsWith('@lid');
  const rawDigits = (conv.chat_id || '').split('@')[0].replace(/\D/g, '');
  const phone = conv.real_phone || (isLid ? '' : rawDigits);
  // Valid phone: 7-13 digits (real international numbers max 13). LID numbers are 14+ digits.
  const isValidPhone = phone && phone.length >= 7 && phone.length <= 13;
  // Always hide first, then show if valid — prevents stale phone from previous chat
  if (waBar) waBar.style.display = 'none';
  if (isValidPhone && waBar && waLink) {
    // Mobile: api.whatsapp.com (triggers app intent on Android/iOS)
    // Desktop: web.whatsapp.com (opens WhatsApp Web)
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    waLink.href = isMobile
      ? `https://api.whatsapp.com/send?phone=${phone}`
      : `https://web.whatsapp.com/send?phone=${phone}`;
    waLink.target = '_blank';
    waBar.style.display = 'block';
    // Show Brave tip if Brave detected and not dismissed
    const isBrave = navigator.brave || /Brave/i.test(navigator.userAgent);
    const tipDismissed = localStorage.getItem('brave_wa_tip_dismissed');
    if (isBrave && !tipDismissed) {
      const tip = document.getElementById('brave-wa-tip');
      if (tip) tip.style.display = 'block';
    }
  }

  // Check if we already have messages for this chat in allMessages
  let msgs = allMessages.filter(m => m.chat_id === chatId);

  // If we have fewer messages than expected, lazy-load from API
  if (msgs.length < conv.message_count && conv.message_count > msgs.length) {
    const thread = document.getElementById('chat-thread');
    thread.style.display = 'flex';
    thread.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">Loading messages...</div>';
    try {
      let data;
      try { data = await api(`/api/rt/personal?chat=${encodeURIComponent(chatId)}&limit=500`); }
      catch { data = await api(`/api/rt/personal?chat=${encodeURIComponent(chatId)}&limit=500`); }
      if (data.items && data.items.length > 0) {
        msgs = data.items;
        // Merge into allMessages cache (avoid duplicates)
        const existingIds = new Set(allMessages.map(m => m.id));
        for (const m of msgs) {
          if (!existingIds.has(m.id)) allMessages.push(m);
        }
      }
    } catch (e) {
      console.warn('Failed to lazy-load chat messages:', e);
    }
  }

  msgs.sort((a, b) => new Date(a.timestamp || a.created_at) - new Date(b.timestamp || b.created_at));
  renderThread(msgs);

  // Scroll to bottom
  const thread = document.getElementById('chat-thread');
  setTimeout(() => thread.scrollTop = thread.scrollHeight, 50);
}

// ── Render Thread ──
// ── Single message bubble (extracted for reuse in live poll) ──
function renderSingleBubble(m, idx) {
  const d = new Date(m.timestamp || m.created_at);
  const isMe = m.from_me === true;
  const side = isMe ? 'me' : 'them';
  const text = m.transcription || m.text_content || m.text || m.body || m.content || '';
  const isVoice = m.message_type === 'voice' || m.message_type === 'audio';
  const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  const msgId = m.id || `msg-${idx}`;
  const senderLabel = isMe ? '' : `<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px">${esc(m.sender_name || '')}</div>`;

  let html = `<div class="msg-row ${side}"><div class="msg-bubble ${side}" id="card-${msgId}">`;
  if (!isMe) html += senderLabel;
  if (isVoice) {
    const dur = m.duration || m.duration_seconds || 0;
    html += `<div class="voice-badge">🎤 ${dur > 0 ? formatDuration(dur) : 'Voice'}</div>`;
  }
  const bullets = parseBullets(m.summary);
  if (bullets.length > 0) {
    html += `<div class="msg-summary"><div class="msg-summary-title">Summary</div>`;
    html += bullets.map(b => `<div class="bullet"><span>${esc(b)}</span></div>`).join('');
    html += `</div>`;
  }
  if (text) {
    html += `<div class="msg-bubble-text">${esc(text)}</div>`;
  } else if (!text && isVoice) {
    const dur = m.duration || m.duration_seconds || 0;
    html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic">🎤 Voice note${dur > 0 ? ' · ' + formatDuration(dur) : ''} — no transcription</div>`;
  } else if (m.message_type === 'image') {
    html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic">📷 ${m.media_caption ? esc(m.media_caption) : 'Photo'}</div>`;
  } else if (m.message_type === 'video') {
    html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic">🎥 Video</div>`;
  } else if (m.message_type === 'document') {
    html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic">📄 Document</div>`;
  } else if (m.message_type === 'media') {
    html += `<div style="font-size:12px;color:var(--text-muted);font-style:italic">📎 Media</div>`;
  }
  const lang = m.language || (text ? detectLang(text) : '');
  const flag = m.language_flag || (lang ? langFlag(lang) : '');
  html += `<div class="msg-bubble-time">${flag ? flag + ' ' : ''}${timeStr}${isMe ? ' ✓' : ''}</div>`;
  if (text && text.length > 5) {
    html += `<div class="translate-toggle" onclick="toggleTranslate('${msgId}')"><span id="arrow-${msgId}" style="font-size:9px">▼</span> Translate</div>`;
    html += `<div class="translate-panel" id="tpanel-${msgId}">`;
    const defaultTarget = getDefaultLang();
    const defLang = TRANSLATE_LANGS.find(l => l.code === defaultTarget) || TRANSLATE_LANGS[0];
    html += `<div class="lang-picker" id="lp-${msgId}">`;
    html += `<button class="lang-picker-btn" onclick="toggleLangPicker('${msgId}')">${defLang.flag} ${defLang.name} ▾</button>`;
    html += `<div class="lang-picker-drop" id="lpd-${msgId}">`;
    html += `<input class="lang-picker-search" placeholder="Search language..." oninput="filterLangs('${msgId}', this.value)">`;
    html += `<div class="lang-picker-list" id="lpl-${msgId}">`;
    TRANSLATE_LANGS.forEach(l => { html += `<div class="lang-picker-item${l.code === defaultTarget ? ' selected' : ''}" data-code="${l.code}" onclick="selectLang('${msgId}','${l.code}')">${l.flag} ${l.name}</div>`; });
    html += `</div></div></div>`;
    html += `<input type="hidden" id="lang-sel-${msgId}" value="${defaultTarget}">`;
    html += `<button class="btn-translate" onclick="translateMsg('${msgId}')">Go</button></div>`;
    html += `<div id="translation-${msgId}" style="display:none" class="translation-result"></div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderThread(messages) {
  const thread = document.getElementById('chat-thread');
  thread.style.display = 'flex';
  let html = '';
  let lastDate = '';

  messages.forEach((m, idx) => {
    const d = new Date(m.timestamp || m.created_at);
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="chat-date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    html += renderSingleBubble(m, idx);
  });

  thread.innerHTML = html;
}

// ── Back Button (mobile) ──
function backToList() {
  document.getElementById('panel-left').classList.remove('hidden-mobile');
  document.getElementById('panel-right').classList.add('hidden-mobile');
}

// ── Utilities ──
function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function parseBullets(summary) {
  if (!summary) return [];
  if (typeof summary === 'object') {
    const pts = summary.keyPoints || summary.key_points || [];
    const actions = summary.actionItems || summary.action_items || [];
    return [...(Array.isArray(pts) ? pts : [pts]), ...(Array.isArray(actions) ? actions.map(a => '☐ ' + a) : [])].filter(Boolean);
  }
  const text = String(summary);
  const lines = text.split(/[•\-\*]|\d+\.\s/).map(s => s.trim()).filter(Boolean);
  return lines.length <= 1 && text.length > 10 ? [text] : lines;
}

function getDefaultLang() { return localStorage.getItem('retena_default_lang') || 'en'; }

// Searchable language picker functions
function toggleLangPicker(msgId) {
  const drop = document.getElementById('lpd-' + msgId);
  const isOpen = drop.classList.contains('open');
  // Close all other pickers
  document.querySelectorAll('.lang-picker-drop.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    drop.classList.add('open');
    const input = drop.querySelector('.lang-picker-search');
    input.value = '';
    input.focus();
    filterLangs(msgId, '');
  }
}

function filterLangs(msgId, query) {
  const list = document.getElementById('lpl-' + msgId);
  const q = query.toLowerCase();
  list.querySelectorAll('.lang-picker-item').forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function selectLang(msgId, code) {
  const lang = TRANSLATE_LANGS.find(l => l.code === code);
  if (!lang) return;
  document.getElementById('lang-sel-' + msgId).value = code;
  const btn = document.querySelector('#lp-' + msgId + ' .lang-picker-btn');
  btn.textContent = lang.flag + ' ' + lang.name + ' ▾';
  document.getElementById('lpd-' + msgId).classList.remove('open');
  // Save as default
  localStorage.setItem('retena_default_lang', code);
}

// Close picker on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.lang-picker')) {
    document.querySelectorAll('.lang-picker-drop.open').forEach(d => d.classList.remove('open'));
  }
});

function langFlag(lang) {
  // Fallback only — DB language_flag should always be set by backend (country-aware)
  // Spanish → 🌐 (neutral) since real flag depends on country (🇩🇴/🇲🇽/🇨🇴/🇪🇸)
  const flags = { en:'🇬🇧', es:'🌐', fr:'🇫🇷', de:'🇩🇪', pt:'🇧🇷', it:'🇮🇹', nl:'🇳🇱', ja:'🇯🇵', zh:'🇨🇳', ko:'🇰🇷', ar:'🇸🇦', ru:'🇷🇺', hi:'🇮🇳', ht:'🇭🇹', unknown:'🏳️' };
  const nameMap = { spanish:'es', english:'en', french:'fr', german:'de', portuguese:'pt', italian:'it', dutch:'nl', japanese:'ja', chinese:'zh', korean:'ko', arabic:'ar', russian:'ru', hindi:'hi', creole:'ht' };
  if (!lang) return '🏳️';
  const lower = lang.toLowerCase().trim();
  const code = nameMap[lower] || lower.slice(0, 2);
  return flags[code] || '🏳️';
}

function detectLang(text) {
  if (!text || text.length < 3) return '';
  const t = ' ' + text.toLowerCase().replace(/[.,!?;:""''()\[\]]/g, ' ') + ' ';
  // Shared words (low weight, in both ES+FR)
  const esShared = (t.match(/\s(el|la|los|las|un|una|de|en|que|y|no|se|lo|por|con|para|del|al|es|como|pero|más|todo|te|me|mi|tu|su|ya|si|hay|fue|ser|va|le|bien)\s/g) || []).length;
  const frShared = (t.match(/\s(le|la|les|de|du|des|un|une|en|et|est|que|ne|pas|je|tu|il|nous|vous|ils|ce|qui|dans|pour|sur|avec|son|sa|au|aux|mais|ou|bien)\s/g) || []).length;
  // Unique ES words (high weight x2)
  const esUnique = (t.match(/\s(bueno|eso|ese|esa|qué|muy|sin|hoy|así|vamos|quiero|puede|tiene|dice|hola|donde|aquí|ahora|cómo|porque|cuando|nunca|nada|algo|sobre|hasta|otra|poco|mucho|puedes|hacer|poner|decir|saber|esto|sido|mañana|después|entre|solo|también|necesito|pues|claro|estoy|estás|estamos|están|está|soy|eres|somos|son|tengo|tienes|tenemos|tienen|quieres|quiere|queremos|quieren|voy|vas|vaya|vengo|viene|vienen|venimos)\s/g) || []).length;
  // Unique FR words (high weight x2)
  const frUnique = (t.match(/\s(donc|car|fait|être|avoir|sont|très|tout|cette|ces|plus|chez|oui|non|merci|bonjour|comme|aussi|même|puis|après|avant|encore|jamais|rien|dit|dis|dire|suis|êtes|etes|avais|avait|avez|avons|était|étais|étaient|beaucoup|travail|mon|ton|votre|notre|nos|vos|leur|leurs|vais|allons|allez|quoi|dont|voilà|voila|alors|ici|là|bon|bonne|bien|ça|va|vas|tout|tous|toutes|fais|font|vient|viennent|venez|venons|pouvez|pouvons|peut|peuvent|voulez|voulons|veut|veulent|savez|savoir|sait|voir|vois|voit|voyez)\s/g) || []).length;
  const en = (t.match(/\s(the|and|is|are|was|were|have|has|this|that|with|from|they|their|would|could|should|about|been|just|also|not|but|will|can|had|all|when|there|what|your|more|some|into|than|its|our|out|very|only|then|them|here|where|still|after|each|much|both|which|who|how|why|yes|got|get|did|does|going|want|said|need|you|we|he|she|it|at|by|or|so|if|up|do|my|me|its|im|dont|cant|wont|didnt|its)\s/g) || []).length;
  const esBonus = (t.match(/[áéíóúñ¿¡]/g) || []).length;
  const frBonus = (t.match(/[àâçèêëîïôùûüœæ]/g) || []).length;
  const esScore = esShared + (esUnique * 2) + esBonus;
  const frScore = frShared + (frUnique * 2) + frBonus;
  const scores = { es: esScore, fr: frScore, en };
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  // Require minimum score of 1 and clear winner (>= shared competitor)
  if (sorted[0][1] === 0) return '';
  return sorted[0][0];
}

// ── Translate ──
function toggleTranslate(msgId) {
  const panel = document.getElementById(`tpanel-${msgId}`);
  const arrow = document.getElementById(`arrow-${msgId}`);
  if (panel) panel.classList.toggle('open');
  if (arrow) arrow.style.transform = panel?.classList.contains('open') ? 'rotate(180deg)' : '';
}

// Reply removed — Retena is silent-capture only

async function translateMsg(msgId) {
  const sel = document.getElementById(`lang-sel-${msgId}`);
  const target = sel.value;
  const card = document.getElementById(`card-${msgId}`);
  const textEl = card?.querySelector('.msg-bubble-text');
  const text = textEl?.textContent;
  if (!text?.trim()) return;

  const resultEl = document.getElementById(`translation-${msgId}`);
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<span style="color:var(--text-muted)">Translating…</span>';
  try {
    const r = await api('/api/rt/translate', { method: 'POST', body: JSON.stringify({ text, target }) });
    const translated = r.translation || r.text || 'Translation unavailable';
    const lang = TRANSLATE_LANGS.find(l => l.code === target);
    resultEl.innerHTML = `<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">${lang?.flag || '🏳️'} ${lang?.name || target}</div><div style="white-space:pre-wrap">${esc(translated)}</div>`;
  } catch (e) {
    resultEl.innerHTML = '<span style="color:#ef4444">Translation failed</span>';
  }
}

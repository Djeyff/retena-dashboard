<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Inbox — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <style>
    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      position: relative;
      margin-bottom: 4px;
    }
    .chat-bubble.them {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .chat-bubble.me {
      background: rgba(230,126,34,0.12);
      border: 1px solid rgba(230,126,34,0.2);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .chat-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .chat-time.right { text-align: right; }
    .chat-date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 0 8px;
      position: relative;
    }
    .chat-date-divider::before,
    .chat-date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .chat-date-divider::before { left: 0; }
    .chat-date-divider::after { right: 0; }
    .chat-thread {
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .voice-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--accent);
    }
    .summary-block {
      padding: 10px 12px;
      border-left: 3px solid var(--accent);
      background: rgba(230,126,34,0.08);
      border-radius: 0 8px 8px 0;
      font-size: 12.5px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin: 6px 0;
      max-width: 85%;
    }
    .summary-block .bullet {
      display: flex;
      gap: 6px;
      padding: 3px 0;
    }
    .summary-block .bullet::before {
      content: '•';
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sender-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content two-panel">

      <!-- Left: Sender List -->
      <div class="panel-left" id="panel-left">
        <div class="panel-left-header">
          <h2>Personal Inbox</h2>
        </div>
        <div style="padding:8px 8px 0">
          <input class="input" placeholder="Search contacts…" id="sender-search" oninput="filterSenders()" style="font-size:13px">
        </div>
        <div class="panel-list" id="sender-list"></div>
      </div>

      <!-- Right: Chat Thread -->
      <div class="panel-right" id="panel-right" style="display:flex;flex-direction:column">
        <div class="panel-empty" id="chat-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
          <p>Select a contact to see their messages</p>
        </div>
        <!-- Chat header -->
        <div id="chat-header" style="display:none;padding:14px 20px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:12px;background:var(--bg-sidebar)">
          <button class="btn btn-secondary btn-sm" onclick="backToList()" id="back-btn" style="display:none">←</button>
          <div id="chat-header-avatar"></div>
          <div>
            <div id="chat-header-name" style="font-weight:700;font-size:15px"></div>
            <div id="chat-header-meta" style="font-size:12px;color:var(--text-muted)"></div>
          </div>
        </div>
        <!-- Messages -->
        <div class="chat-thread" id="chat-thread" style="display:none"></div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allNotes = [];
let senderMap = {};
let selectedSender = null;

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('personal');
  renderMobileTabs('home');
  loadNotes();
});

async function loadNotes() {
  showLoading(document.getElementById('sender-list'));
  try {
    const data = await api('/api/rt/personal');
    allNotes = data.items || data || [];
    buildSenderMap();
    renderSenderList();
  } catch (e) {
    renderEmptyInbox();
  }
}

function buildSenderMap() {
  senderMap = {};
  allNotes.forEach(n => {
    const key = n.sender_name || n.sender || n.chat_id || 'Unknown';
    if (!senderMap[key]) {
      senderMap[key] = {
        name: key,
        messages: [],
        lastMessage: null,
        voiceCount: 0,
        textCount: 0,
      };
    }
    senderMap[key].messages.push(n);
    const isVoice = n.message_type === 'voice' || n.message_type === 'audio';
    if (isVoice) senderMap[key].voiceCount++;
    else senderMap[key].textCount++;
    if (!senderMap[key].lastMessage || new Date(n.created_at) > new Date(senderMap[key].lastMessage.created_at)) {
      senderMap[key].lastMessage = n;
    }
  });
  // Sort each sender's messages chronologically (oldest first)
  Object.values(senderMap).forEach(s => {
    s.messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  });
}

function filterSenders() {
  const q = document.getElementById('sender-search').value.toLowerCase();
  renderSenderList(q);
}

function renderSenderList(filter = '') {
  const el = document.getElementById('sender-list');
  let senders = Object.values(senderMap)
    .sort((a, b) => new Date(b.lastMessage?.created_at || 0) - new Date(a.lastMessage?.created_at || 0));

  if (filter) {
    senders = senders.filter(s => s.name.toLowerCase().includes(filter));
  }

  if (!senders.length) {
    renderEmptyInbox();
    return;
  }

  el.innerHTML = senders.map(s => {
    const last = s.lastMessage;
    const lastText = last?.transcription || last?.text || last?.content || '';
    const isVoice = last?.message_type === 'voice' || last?.message_type === 'audio';
    const total = s.messages.length;

    return `
      <div class="panel-list-item${selectedSender === s.name ? ' selected' : ''}" onclick="selectSender('${s.name.replace(/'/g, "\\'")}')">
        <div style="display:flex;align-items:center;gap:10px">
          ${renderAvatar(s.name)}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
              <span style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
              <span style="font-size:11px;color:var(--text-muted);flex-shrink:0">${timeAgo(last?.created_at)}</span>
            </div>
            <div style="font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${isVoice ? '🎤 ' : ''}${truncate(lastText, 50)}
            </div>
            <div class="sender-badge">
              ${total} message${total !== 1 ? 's' : ''}
              ${s.voiceCount ? ` · 🎤 ${s.voiceCount}` : ''}
              ${s.textCount ? ` · 💬 ${s.textCount}` : ''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderEmptyInbox() {
  const el = document.getElementById('sender-list');
  el.innerHTML = `
    <div class="empty-state" style="padding:40px 20px">
      <h3>No personal notes yet</h3>
      <p>Forward a voice note from any chat to Retena's number to transcribe it.</p>
      <div class="card" style="text-align:left;margin-top:16px">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Send voice notes to:</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px;font-weight:700;color:var(--text-primary)">+1 (350) 223-9900</span>
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('+13502239900');showToast('Copied!')">Copy</button>
        </div>
      </div>
    </div>`;
}

function selectSender(name) {
  selectedSender = name;
  renderSenderList(document.getElementById('sender-search').value.toLowerCase());

  const sender = senderMap[name];
  if (!sender) return;

  // Mobile: show chat panel
  document.getElementById('panel-left').classList.add('hidden-mobile');
  document.getElementById('panel-right').classList.remove('hidden-mobile');
  document.getElementById('chat-empty').style.display = 'none';

  // Header
  const header = document.getElementById('chat-header');
  header.style.display = 'flex';
  document.getElementById('chat-header-avatar').innerHTML = renderAvatar(name, 'lg');
  document.getElementById('chat-header-name').textContent = name;
  document.getElementById('chat-header-meta').textContent = `${sender.messages.length} messages · ${sender.voiceCount} voice · ${sender.textCount} text`;

  if (window.innerWidth <= 768) document.getElementById('back-btn').style.display = 'inline-flex';

  // Render chat thread
  const thread = document.getElementById('chat-thread');
  thread.style.display = 'flex';
  renderChatThread(sender.messages);

  // Scroll to bottom
  setTimeout(() => thread.scrollTop = thread.scrollHeight, 50);
}

function renderChatThread(messages) {
  const thread = document.getElementById('chat-thread');
  let html = '';
  let lastDate = '';

  messages.forEach(m => {
    const d = new Date(m.created_at);
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

    // Date divider
    if (dateStr !== lastDate) {
      html += `<div class="chat-date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }

    const isVoice = m.message_type === 'voice' || m.message_type === 'audio';
    const text = m.transcription || m.text || m.content || '';
    const isFromMe = m.from_me || m.sender_name === 'Jeffrey';
    const bubbleClass = isFromMe ? 'me' : 'them';
    const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });

    html += `<div style="display:flex;flex-direction:column;${isFromMe ? 'align-items:flex-end' : 'align-items:flex-start'}">`;

    const bullets = parseBullets(m.summary);
    const hasBullets = bullets.length > 1;
    const isShortTranscript = text.length < 100;

    // Summary ABOVE transcript (if enough bullets and transcript isn't tiny)
    if (hasBullets && !isShortTranscript) {
      html += renderSummaryBlock(bullets, isFromMe);
    }

    html += `<div class="chat-bubble ${bubbleClass}">`;

    if (isVoice) {
      html += `<div class="voice-inline">🎤 Voice note · ${formatDuration(m.duration || m.duration_seconds || 0)}${m.language ? ` · ${langFlag(m.language)}` : ''}</div>`;
    }

    if (text) {
      html += `<div style="white-space:pre-wrap;color:var(--text-primary)">${text}</div>`;
    }

    html += `</div>`; // close bubble
    html += `<div class="chat-time ${isFromMe ? 'right' : ''}">${timeStr}</div>`;

    // Summary BELOW transcript (always if bullets exist)
    if (hasBullets && !isShortTranscript) {
      html += renderSummaryBlock(bullets, isFromMe);
    } else if (bullets.length > 0) {
      // Short transcript or single bullet → only below
      html += renderSummaryBlock(bullets, isFromMe);
    }

    html += `</div>`; // close wrapper
  });

  thread.innerHTML = html;
}

function parseBullets(summary) {
  if (!summary) return [];
  let text = '';
  if (typeof summary === 'object') {
    const pts = summary.keyPoints || summary.key_points || [];
    const actions = summary.actionItems || summary.action_items || [];
    const parts = [...(Array.isArray(pts) ? pts : [pts]), ...(Array.isArray(actions) ? actions.map(a => '☐ ' + a) : [actions])];
    return parts.filter(Boolean);
  }
  text = String(summary);
  // Split on bullet markers: •, -, *, or numbered
  const lines = text.split(/[•\-\*]|\d+\.\s/).map(s => s.trim()).filter(Boolean);
  if (lines.length <= 1 && text.length > 10) return [text];
  return lines;
}

function renderSummaryBlock(bullets, alignRight) {
  const align = alignRight ? 'align-self:flex-end' : 'align-self:flex-start';
  return `<div class="summary-block" style="${align}">${bullets.map(b => `<div class="bullet"><span>${b}</span></div>`).join('')}</div>`;
}

function formatSummary(s) {
  let html = '';
  if (s.keyPoints || s.key_points) {
    const pts = s.keyPoints || s.key_points;
    html += Array.isArray(pts) ? pts.map(p => '• ' + p).join('<br>') : pts;
  }
  if (s.actionItems || s.action_items) {
    const items = s.actionItems || s.action_items;
    html += '<br><strong>Action items:</strong><br>';
    html += Array.isArray(items) ? items.map(a => '☐ ' + a).join('<br>') : items;
  }
  return html || JSON.stringify(s);
}

function backToList() {
  document.getElementById('panel-left').classList.remove('hidden-mobile');
  document.getElementById('panel-right').classList.add('hidden-mobile');
}

function langFlag(lang) {
  const flags = { en:'🇬🇧', es:'🇪🇸', fr:'🇫🇷', de:'🇩🇪', pt:'🇧🇷', it:'🇮🇹', nl:'🇳🇱', ja:'🇯🇵', zh:'🇨🇳', ko:'🇰🇷', ar:'🇸🇦', ru:'🇷🇺', hi:'🇮🇳' };
  if (!lang) return '';
  const code = lang.slice(0, 2).toLowerCase();
  return flags[code] || '🌐';
}
</script>
</body>
</html>

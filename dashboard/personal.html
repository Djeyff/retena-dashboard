<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Inbox — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <style>
    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      position: relative;
      margin-bottom: 4px;
    }
    .chat-bubble.them {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .chat-bubble.me {
      background: rgba(230,126,34,0.12);
      border: 1px solid rgba(230,126,34,0.2);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .chat-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .chat-time.right { text-align: right; }
    .chat-date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 0 8px;
      position: relative;
    }
    .chat-date-divider::before,
    .chat-date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .chat-date-divider::before { left: 0; }
    .chat-date-divider::after { right: 0; }
    .chat-thread {
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .voice-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--accent);
    }
    .msg-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 88%;
      margin-bottom: 12px;
    }
    .msg-card.me {
      background: rgba(230,126,34,0.06);
      border-color: rgba(230,126,34,0.2);
      align-self: flex-end;
    }
    .msg-card.them { align-self: flex-start; }
    .msg-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .msg-card-header .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .msg-card-header .badge-voice {
      background: rgba(230,126,34,0.15);
      color: var(--accent);
    }
    .msg-card-header .badge-text {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
    }
    .msg-summary {
      border-left: 3px solid var(--accent);
      background: rgba(230,126,34,0.06);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      margin: 10px 0;
    }
    .msg-summary-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .msg-summary .bullet {
      display: flex;
      gap: 6px;
      padding: 3px 0;
      font-size: 12.5px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .msg-summary .bullet::before {
      content: '•';
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg-transcript {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-primary);
      white-space: pre-wrap;
      padding: 8px 0 4px;
    }
    .msg-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .translate-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 6px;
      padding: 2px 0;
      user-select: none;
    }
    .translate-toggle:hover { color: var(--accent); }
    .translate-toggle .arrow { transition: transform 0.2s; display: inline-block; font-size: 9px; }
    .translate-toggle .arrow.open { transform: rotate(180deg); }
    .translate-panel {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding-top: 6px;
    }
    .translate-panel.open { display: flex; }
    .translate-panel select {
      background: var(--bg-sidebar);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: inherit;
    }
    .translate-panel .btn-translate {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(230,126,34,0.15);
      color: var(--accent);
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .translate-panel .btn-translate:hover { background: rgba(230,126,34,0.25); }
    .translation-result {
      margin-top: 8px;
      padding: 10px 12px;
      border-left: 3px solid #60a5fa;
      background: rgba(59,130,246,0.06);
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .lang-arrow {
      font-size: 11px;
      color: var(--text-muted);
    }
    .sender-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content two-panel">

      <!-- Left: Sender List -->
      <div class="panel-left" id="panel-left">
        <div class="panel-left-header">
          <h2>Personal Inbox</h2>
        </div>
        <div style="padding:8px 8px 0">
          <input class="input" placeholder="Search contacts…" id="sender-search" oninput="filterSenders()" style="font-size:13px">
        </div>
        <div class="panel-list" id="sender-list"></div>
      </div>

      <!-- Right: Chat Thread -->
      <div class="panel-right hidden-mobile" id="panel-right">
        <div class="panel-empty" id="chat-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
          <p>Select a contact to see their messages</p>
        </div>
        <!-- Chat header -->
        <div id="chat-header" style="display:none;padding:14px 20px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:12px;background:var(--bg-sidebar)">
          <button class="btn btn-secondary btn-sm" onclick="backToList()" id="back-btn" style="display:none">←</button>
          <div id="chat-header-avatar"></div>
          <div>
            <div id="chat-header-name" style="font-weight:700;font-size:15px"></div>
            <div id="chat-header-meta" style="font-size:12px;color:var(--text-muted)"></div>
          </div>
        </div>
        <!-- Messages -->
        <div class="chat-thread" id="chat-thread" style="display:none"></div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allNotes = [];
let senderMap = {};
let selectedSender = null;

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('personal');
  renderMobileTabs('home');
  loadNotes();
});

async function loadNotes() {
  showLoading(document.getElementById('sender-list'));
  try {
    const data = await api('/api/rt/personal');
    allNotes = data.items || data || [];
    buildSenderMap();
    renderSenderList();
  } catch (e) {
    renderEmptyInbox();
  }
}

function buildSenderMap() {
  senderMap = {};
  allNotes.forEach(n => {
    const key = n.sender_name || n.sender || n.chat_id || 'Unknown';
    if (!senderMap[key]) {
      senderMap[key] = {
        name: key,
        messages: [],
        lastMessage: null,
        voiceCount: 0,
        textCount: 0,
      };
    }
    senderMap[key].messages.push(n);
    const isVoice = n.message_type === 'voice' || n.message_type === 'audio';
    if (isVoice) senderMap[key].voiceCount++;
    else senderMap[key].textCount++;
    if (!senderMap[key].lastMessage || new Date(n.created_at) > new Date(senderMap[key].lastMessage.created_at)) {
      senderMap[key].lastMessage = n;
    }
  });
  // Sort each sender's messages chronologically (oldest first)
  Object.values(senderMap).forEach(s => {
    s.messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  });
}

function filterSenders() {
  const q = document.getElementById('sender-search').value.toLowerCase();
  renderSenderList(q);
}

function renderSenderList(filter = '') {
  const el = document.getElementById('sender-list');
  let senders = Object.values(senderMap)
    .sort((a, b) => new Date(b.lastMessage?.created_at || 0) - new Date(a.lastMessage?.created_at || 0));

  if (filter) {
    senders = senders.filter(s => s.name.toLowerCase().includes(filter));
  }

  if (!senders.length) {
    renderEmptyInbox();
    return;
  }

  el.innerHTML = senders.map(s => {
    const last = s.lastMessage;
    const lastText = last?.transcription || last?.text || last?.content || '';
    const isVoice = last?.message_type === 'voice' || last?.message_type === 'audio';
    const total = s.messages.length;

    return `
      <div class="panel-list-item${selectedSender === s.name ? ' selected' : ''}" onclick="selectSender('${s.name.replace(/'/g, "\\'")}')">
        <div style="display:flex;align-items:center;gap:10px">
          ${renderAvatar(s.name)}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
              <span style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
              <span style="font-size:11px;color:var(--text-muted);flex-shrink:0">${timeAgo(last?.created_at)}</span>
            </div>
            <div style="font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${isVoice ? '🎤 ' : ''}${truncate(lastText, 50)}
            </div>
            <div class="sender-badge">
              ${total} message${total !== 1 ? 's' : ''}
              ${s.voiceCount ? ` · 🎤 ${s.voiceCount}` : ''}
              ${s.textCount ? ` · 💬 ${s.textCount}` : ''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderEmptyInbox() {
  const el = document.getElementById('sender-list');
  el.innerHTML = `
    <div class="empty-state" style="padding:40px 20px">
      <h3>No personal notes yet</h3>
      <p>Forward a voice note from any chat to Retena's number to transcribe it.</p>
      <div class="card" style="text-align:left;margin-top:16px">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Send voice notes to:</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px;font-weight:700;color:var(--text-primary)">+1 (350) 223-9900</span>
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('+13502239900');showToast('Copied!')">Copy</button>
        </div>
      </div>
    </div>`;
}

function selectSender(name) {
  selectedSender = name;
  renderSenderList(document.getElementById('sender-search').value.toLowerCase());

  const sender = senderMap[name];
  if (!sender) return;

  // Mobile: show chat panel
  document.getElementById('panel-left').classList.add('hidden-mobile');
  document.getElementById('panel-right').classList.remove('hidden-mobile');
  document.getElementById('chat-empty').style.display = 'none';

  // Header
  const header = document.getElementById('chat-header');
  header.style.display = 'flex';
  document.getElementById('chat-header-avatar').innerHTML = renderAvatar(name, 'lg');
  document.getElementById('chat-header-name').textContent = name;
  document.getElementById('chat-header-meta').textContent = `${sender.messages.length} messages · ${sender.voiceCount} voice · ${sender.textCount} text`;

  if (window.innerWidth <= 768) document.getElementById('back-btn').style.display = 'inline-flex';

  // Render chat thread
  const thread = document.getElementById('chat-thread');
  thread.style.display = 'flex';
  renderChatThread(sender.messages);

  // Scroll to bottom
  setTimeout(() => thread.scrollTop = thread.scrollHeight, 50);
}

function renderChatThread(messages) {
  const thread = document.getElementById('chat-thread');
  let html = '';
  let lastDate = '';

  messages.forEach((m, idx) => {
    const d = new Date(m.created_at);
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

    if (dateStr !== lastDate) {
      html += `<div class="chat-date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }

    const isVoice = m.message_type === 'voice' || m.message_type === 'audio';
    const text = m.transcription || m.text || m.content || '';
    const isFromMe = m.from_me || m.sender_name === 'Jeffrey';
    const cardClass = isFromMe ? 'me' : 'them';
    const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    const bullets = parseBullets(m.summary);
    const msgId = m.id || `msg-${idx}`;
    const lang = m.language || detectLang(text);
    const flag = langFlag(lang);
    const langLabel = langName(lang);

    html += `<div class="msg-card ${cardClass}" id="card-${msgId}">`;

    // Header row
    html += `<div class="msg-card-header">`;
    if (isVoice) {
      html += `<span class="badge badge-voice">🎤 ${formatDuration(m.duration || m.duration_seconds || 0)}</span>`;
    } else {
      html += `<span class="badge badge-text">💬 Text</span>`;
    }
    html += `<span style="font-size:16px">${flag}</span>`;
    html += `<span style="font-size:11px;color:var(--text-muted)">${langLabel}</span>`;
    html += `<span style="flex:1"></span>`;
    html += `<span style="font-size:11px;color:var(--text-muted)">${timeStr}</span>`;
    html += `</div>`;

    // Summary bullets (if any)
    if (bullets.length > 0) {
      html += `<div class="msg-summary">`;
      html += `<div class="msg-summary-title">Summary</div>`;
      html += bullets.map(b => `<div class="bullet"><span>${b}</span></div>`).join('');
      html += `</div>`;
    }

    // Transcript
    if (text) {
      html += `<div class="msg-transcript">${text}</div>`;
    }

    // Translate toggle (collapsed by default)
    html += `<div class="translate-toggle" onclick="toggleTranslate('${msgId}')">`;
    html += `<span class="arrow" id="arrow-${msgId}">▼</span> Translate`;
    html += `</div>`;
    html += `<div class="translate-panel" id="tpanel-${msgId}">`;
    html += `<span style="font-size:11px;color:var(--text-muted)">${flag} ${langLabel} →</span>`;
    html += `<select id="lang-sel-${msgId}">`;
    const defaultTarget = getDefaultLang();
    TRANSLATE_LANGS.forEach(l => {
      html += `<option value="${l.code}" ${l.code === defaultTarget ? 'selected' : ''}>${l.flag} ${l.name}</option>`;
    });
    html += `</select>`;
    html += `<button class="btn-translate" onclick="translateMsg('${msgId}')">Go</button>`;
    html += `</div>`;
    html += `<div id="translation-${msgId}" style="display:none" class="translation-result"></div>`;

    html += `</div>`; // close card
  });

  thread.innerHTML = html;
}

const TRANSLATE_LANGS = [
  { code: 'en', flag: '🇬🇧', name: 'English' },
  { code: 'es', flag: '🇪🇸', name: 'Spanish' },
  { code: 'fr', flag: '🇫🇷', name: 'French' },
  { code: 'pt', flag: '🇧🇷', name: 'Portuguese' },
  { code: 'de', flag: '🇩🇪', name: 'German' },
  { code: 'it', flag: '🇮🇹', name: 'Italian' },
  { code: 'nl', flag: '🇳🇱', name: 'Dutch' },
  { code: 'ru', flag: '🇷🇺', name: 'Russian' },
  { code: 'zh', flag: '🇨🇳', name: 'Chinese' },
  { code: 'ja', flag: '🇯🇵', name: 'Japanese' },
  { code: 'ko', flag: '🇰🇷', name: 'Korean' },
  { code: 'ar', flag: '🇸🇦', name: 'Arabic' },
  { code: 'hi', flag: '🇮🇳', name: 'Hindi' },
  { code: 'ht', flag: '🇭🇹', name: 'Creole' },
];

function getDefaultLang() {
  return localStorage.getItem('retena_default_lang') || 'en';
}

function detectLang(text) {
  if (!text || text.length < 3) return 'unknown';
  const t = ' ' + text.toLowerCase().replace(/[.,!?;:""''()\[\]]/g, ' ') + ' ';

  // Spanish — heavy list, common DR/Caribbean Spanish included
  const es = (t.match(/\s(el|la|los|las|un|una|de|en|que|y|no|se|lo|por|con|para|del|al|es|como|pero|más|todo|te|me|mi|tu|su|ya|si|hay|fue|ser|ir|va|le|a|o|bien|bueno|eso|ese|esa|qué|muy|sin|hoy|así|vamos|quiero|puede|tiene|dice|dijo|hola|donde|aquí|ahora|cómo|porque|cuando|nunca|nada|algo|sobre|hasta|otra|otro|poco|mucho|puedes|hacer|poner|decir|saber|esto|sido|mañana|después|entre|solo|también|necesito|plano|dimensiones)\s/g) || []).length;

  // French
  const fr = (t.match(/\s(le|la|les|de|du|des|un|une|en|et|est|que|ne|pas|je|tu|il|nous|vous|ils|ce|qui|dans|pour|sur|avec|son|sa|ses|au|aux|mais|ou|donc|car|bien|fait|être|avoir|sont|très|tout|cette|ces|plus|chez|oui|non|merci|bonjour|comme|aussi|même|puis|après|avant|encore|jamais|rien|peu|trop|ici|là)\s/g) || []).length;

  // English
  const en = (t.match(/\s(the|and|is|are|was|were|have|has|this|that|with|from|they|their|would|could|should|about|been|just|also|not|but|will|can|had|all|when|there|what|your|more|some|into|than|its|our|out|very|only|then|them|here|where|still|after|each|much|both|which|who|how|why|yes|no|got|get|did|does|going|want|said|need)\s/g) || []).length;

  // Portuguese
  const pt = (t.match(/\s(o|a|os|as|um|uma|de|em|que|e|não|se|por|com|para|do|da|dos|das|ao|aos|mas|ou|como|mais|seu|sua|já|bem|isso|este|esta|onde|aqui|muito|ainda|entre|foram|agora|então|também|pode|tem|há|foi|são|está|você|meu|minha|todo|toda|depois|antes|sempre|nunca|nada|outro|outra)\s/g) || []).length;

  // Haitian Creole — very specific words that don't overlap with Spanish/French
  const ht = (t.match(/\s(mwen|ou|li|yo|pa|nan|ak|pou|ki|sa|te|ap|anpil|kòm|jan|lè|konsa|bagay|lavi|fè|gen|manje|dlo|lakay|pitit|zanmi|travay|jwenn|konn|bezwen|kote|poukisa|kilès|tout|tankou|parèt|rete|vini)\s/g) || []).length;

  // Scoring: each word match = 1 point, bonus for diacritics
  const esBonus = (t.match(/[áéíóúñ¿¡]/g) || []).length;
  const frBonus = (t.match(/[àâçèêëîïôùûüœæ]/g) || []).length;

  const scores = {
    es: es + esBonus,
    fr: fr + frBonus,
    en: en,
    pt: pt,
    ht: ht,
  };

  // Tie-breaking: if es and ht are close, prefer es (Caribbean Spanish often shares short words)
  if (scores.ht > 0 && scores.es >= scores.ht) scores.ht = 0;
  // If es and pt are close, check for unique markers
  if (scores.pt > 0 && scores.es > 0 && Math.abs(scores.es - scores.pt) <= 2) {
    if (/[ñ¿¡]/.test(t)) scores.pt = 0; // definitely Spanish
    if (/[ãõ]/.test(t) || /\snão\s/.test(t)) scores.es = 0; // definitely Portuguese
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return sorted[0][1] > 0 ? sorted[0][0] : 'es'; // default to Spanish for DR context
}

function langName(code) {
  if (!code) return 'Unknown';
  const nameMap = { spanish:'es', english:'en', french:'fr', german:'de', portuguese:'pt', italian:'it', dutch:'nl', japanese:'ja', chinese:'zh', korean:'ko', arabic:'ar', russian:'ru', hindi:'hi', creole:'ht' };
  const lower = code.toLowerCase().trim();
  const c = nameMap[lower] || lower.slice(0, 2);
  const lang = TRANSLATE_LANGS.find(l => l.code === c);
  return lang ? lang.name : code.charAt(0).toUpperCase() + code.slice(1);
}

function toggleTranslate(msgId) {
  const panel = document.getElementById(`tpanel-${msgId}`);
  const arrow = document.getElementById(`arrow-${msgId}`);
  panel.classList.toggle('open');
  arrow.classList.toggle('open');
}

async function translateMsg(msgId) {
  const sel = document.getElementById(`lang-sel-${msgId}`);
  const target = sel.value;
  const card = document.getElementById(`card-${msgId}`);

  // Collect summary bullets + transcript
  const transcript = card?.querySelector('.msg-transcript');
  const bulletEls = card?.querySelectorAll('.msg-summary .bullet span') || [];
  const parts = [];
  if (bulletEls.length) {
    parts.push('SUMMARY:');
    bulletEls.forEach(b => parts.push('• ' + b.textContent));
    parts.push('---');
  }
  if (transcript) parts.push(transcript.textContent);
  const text = parts.join('\n');
  if (!text.trim()) return;

  const resultEl = document.getElementById(`translation-${msgId}`);
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<span style="color:var(--text-muted)">Translating…</span>';
  try {
    const r = await api('/api/rt/translate', { method: 'POST', body: JSON.stringify({ text, target }) });
    const targetLang = TRANSLATE_LANGS.find(l => l.code === target);
    let translated = r.translation || r.text || 'Translation unavailable';

    // Split on --- to render summary vs transcript separately
    let html = '';
    const sections = translated.split(/\n?---\n?/);
    if (sections.length >= 2) {
      // Summary section
      const summaryLines = sections[0].split('\n').filter(l => l.trim());
      html += '<div style="border-left:3px solid #60a5fa;background:rgba(59,130,246,0.06);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px">';
      html += '<div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">SUMMARY</div>';
      summaryLines.forEach(line => {
        const clean = line.replace(/^[•\-\*]\s*/, '').trim();
        if (clean) html += `<div style="display:flex;gap:6px;padding:3px 0;font-size:12.5px;color:var(--text-secondary);line-height:1.6"><span style="color:#60a5fa;font-weight:700;flex-shrink:0">•</span><span>${clean}</span></div>`;
      });
      html += '</div>';
      // Transcript section
      html += `<div style="font-size:13px;line-height:1.65;color:var(--text-primary);white-space:pre-wrap">${sections.slice(1).join('\n---\n').trim()}</div>`;
    } else {
      html += `<div style="white-space:pre-wrap">${translated}</div>`;
    }

    resultEl.innerHTML = `<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">${targetLang?.flag || '🏳️'} ${targetLang?.name || target}</div>${html}`;
  } catch (e) {
    resultEl.innerHTML = '<span style="color:#ef4444">Translation failed</span>';
  }
}

function parseBullets(summary) {
  if (!summary) return [];
  let text = '';
  if (typeof summary === 'object') {
    const pts = summary.keyPoints || summary.key_points || [];
    const actions = summary.actionItems || summary.action_items || [];
    const parts = [...(Array.isArray(pts) ? pts : [pts]), ...(Array.isArray(actions) ? actions.map(a => '☐ ' + a) : [actions])];
    return parts.filter(Boolean);
  }
  text = String(summary);
  // Split on bullet markers: •, -, *, or numbered
  const lines = text.split(/[•\-\*]|\d+\.\s/).map(s => s.trim()).filter(Boolean);
  if (lines.length <= 1 && text.length > 10) return [text];
  return lines;
}

function formatSummary(s) {
  let html = '';
  if (s.keyPoints || s.key_points) {
    const pts = s.keyPoints || s.key_points;
    html += Array.isArray(pts) ? pts.map(p => '• ' + p).join('<br>') : pts;
  }
  if (s.actionItems || s.action_items) {
    const items = s.actionItems || s.action_items;
    html += '<br><strong>Action items:</strong><br>';
    html += Array.isArray(items) ? items.map(a => '☐ ' + a).join('<br>') : items;
  }
  return html || JSON.stringify(s);
}

function backToList() {
  document.getElementById('panel-left').classList.remove('hidden-mobile');
  document.getElementById('panel-right').classList.add('hidden-mobile');
}

function langFlag(lang) {
  const flags = { en:'🇬🇧', es:'🇪🇸', fr:'🇫🇷', de:'🇩🇪', pt:'🇧🇷', it:'🇮🇹', nl:'🇳🇱', ja:'🇯🇵', zh:'🇨🇳', ko:'🇰🇷', ar:'🇸🇦', ru:'🇷🇺', hi:'🇮🇳', ht:'🇭🇹', unknown:'🏳️' };
  // Also map full names → codes
  const nameMap = { spanish:'es', english:'en', french:'fr', german:'de', portuguese:'pt', italian:'it', dutch:'nl', japanese:'ja', chinese:'zh', korean:'ko', arabic:'ar', russian:'ru', hindi:'hi', creole:'ht' };
  if (!lang) return '🏳️';
  const lower = lang.toLowerCase().trim();
  const code = nameMap[lower] || lower.slice(0, 2);
  return flags[code] || '🏳️';
}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Inbox — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content two-panel">

      <!-- Left: Note List -->
      <div class="panel-left" id="panel-left">
        <div class="panel-left-header">
          <h2>Personal Inbox</h2>
        </div>
        <div class="filter-bar" style="padding:8px 8px 0">
          <span class="filter-pill active" data-filter="all" onclick="setFilter('all')">All</span>
          <span class="filter-pill" data-filter="voice" onclick="setFilter('voice')">🎤 Voice</span>
          <span class="filter-pill" data-filter="text" onclick="setFilter('text')">💬 Text</span>
          <span class="filter-pill" data-filter="starred" onclick="setFilter('starred')">⭐ Starred</span>
        </div>
        <div class="panel-list" id="note-list"></div>
      </div>

      <!-- Right: Note Detail -->
      <div class="panel-right" id="panel-right">
        <div class="panel-empty" id="note-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>
          <p>Select a note to see details</p>
        </div>
        <div id="note-detail" style="display:none;padding:24px"></div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allNotes = [];
let selectedNoteId = null;
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('personal');
  renderMobileTabs('home');
  loadNotes();
});

async function loadNotes() {
  showLoading(document.getElementById('note-list'));
  try {
    const data = await api('/api/rt/personal');
    allNotes = data.items || data || [];
    renderNoteList();
  } catch (e) {
    renderEmptyInbox();
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  renderNoteList();
}

function renderNoteList() {
  const el = document.getElementById('note-list');
  let notes = allNotes;
  if (currentFilter === 'voice') notes = notes.filter(n => n.message_type === 'voice' || n.type === 'voice');
  else if (currentFilter === 'text') notes = notes.filter(n => n.message_type === 'text' || n.type === 'text' || (!n.message_type && !n.duration));
  else if (currentFilter === 'starred') notes = notes.filter(n => n.starred || n.is_starred);

  if (!notes.length) {
    renderEmptyInbox();
    return;
  }

  el.innerHTML = notes.map(n => {
    const id = n.id;
    const isVoice = n.message_type === 'voice' || n.type === 'voice' || n.duration;
    const text = n.transcription || n.text || n.message_text || n.content || '';
    const starred = n.starred || n.is_starred;
    return `
      <div class="panel-list-item${selectedNoteId === id ? ' selected' : ''}" onclick="selectNote('${id}')">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              ${isVoice ? `<span class="pill pill-voice">🎤 ${formatDuration(n.duration || n.voice_duration_sec || 0)}</span>` : '<span class="pill pill-text">💬 Text</span>'}
              <span class="pill pill-personal">Personal</span>
              ${n.language ? `<span style="font-size:11px">${langFlag(n.language)}</span>` : ''}
            </div>
            <div style="font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${truncate(text, 80)}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${timeAgo(n.created_at || n.timestamp)}</div>
          </div>
          <span style="cursor:pointer;font-size:16px" onclick="event.stopPropagation();toggleStar('${id}')">${starred ? '⭐' : '☆'}</span>
        </div>
      </div>`;
  }).join('');
}

function renderEmptyInbox() {
  const el = document.getElementById('note-list');
  el.innerHTML = `
    <div class="empty-state" style="padding:40px 20px">
      <h3>No personal notes yet</h3>
      <p>Forward a voice note from any chat to Retena's number to transcribe it.</p>
      <div class="card" style="text-align:left;margin-top:16px">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Send voice notes to:</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px;font-weight:700;color:var(--text-primary)">+1 (350) 223-9900</span>
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText('+13502239900');showToast('Copied!')">Copy</button>
        </div>
      </div>
    </div>`;
}

async function selectNote(id) {
  selectedNoteId = id;
  renderNoteList();

  document.getElementById('panel-left').classList.add('hidden-mobile');
  document.getElementById('panel-right').classList.remove('hidden-mobile');
  document.getElementById('note-empty').style.display = 'none';

  const detail = document.getElementById('note-detail');
  detail.style.display = 'block';
  showLoading(detail);

  try {
    const n = await api(`/api/rt/personal/${id}`);
    renderNoteDetail(n);
  } catch (e) {
    // Try from cache
    const cached = allNotes.find(n => n.id === id);
    if (cached) renderNoteDetail(cached);
    else showError(detail);
  }
}

function renderNoteDetail(n) {
  const detail = document.getElementById('note-detail');
  const isVoice = n.message_type === 'voice' || n.type === 'voice' || n.duration;
  const text = n.transcription || n.text || n.message_text || n.content || '';
  const summary = n.summary || n.summary_json;
  const starred = n.starred || n.is_starred;

  detail.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="backToList()" style="display:none;margin-bottom:16px" id="back-btn">← Back</button>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      ${isVoice ? `<span class="pill pill-voice">🎤 ${formatDuration(n.duration || n.voice_duration_sec || 0)}</span>` : '<span class="pill pill-text">💬 Text</span>'}
      <span class="pill pill-personal">Personal</span>
      ${n.language ? `<span style="font-size:12px">${langFlag(n.language)} ${n.language}</span>` : ''}
      <span style="font-size:12px;color:var(--text-muted)">${formatDate(n.created_at || n.timestamp)}</span>
    </div>

    ${summary ? `
    <div class="card" style="margin-bottom:16px;border-left:3px solid var(--purple-text);padding-left:16px">
      <div class="section-title" style="margin-bottom:8px">Summary</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${typeof summary === 'object' ? formatSummary(summary) : summary}</div>
    </div>` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="section-title" style="margin-bottom:8px">Transcript</div>
      <div style="font-size:14px;line-height:1.7;color:var(--text-primary);white-space:pre-wrap">${text || 'No transcript available'}</div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="copyText(\`${text.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">📋 Copy</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadNote('${n.id}')">⬇ Download .txt</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleStar('${n.id}')">${starred ? '⭐ Starred' : '☆ Star'}</button>
      <button class="btn btn-danger btn-sm" onclick="deleteNote('${n.id}')">🗑 Delete</button>
    </div>
  `;

  if (window.innerWidth <= 768) document.getElementById('back-btn').style.display = 'inline-flex';
}

function formatSummary(s) {
  let html = '';
  if (s.keyPoints || s.key_points) {
    const pts = s.keyPoints || s.key_points;
    html += Array.isArray(pts) ? pts.map(p => '• ' + p).join('<br>') : pts;
  }
  if (s.actionItems || s.action_items) {
    const items = s.actionItems || s.action_items;
    html += '<br><br><strong>Action items:</strong><br>';
    html += Array.isArray(items) ? items.map(a => '☐ ' + a).join('<br>') : items;
  }
  return html || JSON.stringify(s);
}

function backToList() {
  document.getElementById('panel-left').classList.remove('hidden-mobile');
  document.getElementById('panel-right').classList.add('hidden-mobile');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function downloadNote(id) {
  const n = allNotes.find(n => n.id === id);
  if (!n) return;
  const text = n.transcription || n.text || n.message_text || n.content || '';
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `retena-note-${id}.txt`;
  a.click();
}

async function toggleStar(id) {
  try {
    await api(`/api/rt/personal/${id}/star`, { method: 'POST' });
    const n = allNotes.find(n => n.id === id);
    if (n) { n.starred = !n.starred; n.is_starred = n.starred; }
    renderNoteList();
    if (selectedNoteId === id) selectNote(id);
    showToast('Updated');
  } catch (e) { showToast('Failed to update'); }
}

async function deleteNote(id) {
  if (!confirm('Delete this note? This cannot be undone.')) return;
  try {
    await api(`/api/rt/personal/${id}`, { method: 'DELETE' });
    allNotes = allNotes.filter(n => n.id !== id);
    renderNoteList();
    document.getElementById('note-detail').style.display = 'none';
    document.getElementById('note-empty').style.display = 'flex';
    backToList();
    showToast('Note deleted');
  } catch (e) { showToast('Failed to delete'); }
}

function langFlag(lang) {
  const flags = { en:'🇬🇧', es:'🇪🇸', fr:'🇫🇷', de:'🇩🇪', pt:'🇧🇷', it:'🇮🇹', nl:'🇳🇱', ja:'🇯🇵', zh:'🇨🇳', ko:'🇰🇷', ar:'🇸🇦', ru:'🇷🇺', hi:'🇮🇳' };
  if (!lang) return '';
  const code = lang.slice(0, 2).toLowerCase();
  return flags[code] || '🌐';
}
</script>
</body>
</html>

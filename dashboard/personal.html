<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Inbox — Retena</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/dashboard/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <h1>📥 Personal Inbox</h1>
        <p>Private messages from your WhatsApp contacts</p>
      </div>
      <div style="display:flex;gap:6px" id="type-filters">
        <button class="filter-btn active" onclick="filterType('all')">All</button>
        <button class="filter-btn" onclick="filterType('voice')">🎙 Voice</button>
        <button class="filter-btn" onclick="filterType('text')">💬 Text</button>
      </div>
    </div>
    <style>.filter-btn{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .2s}.filter-btn.active{background:rgba(230,126,34,0.15);color:#E67E22;border-color:rgba(230,126,34,0.3)}</style>
    <div class="card" id="personal-list"><div style="padding:20px;text-align:center"><div class="spinner"></div></div></div>
  </main>
  <div id="mobile-tabs"></div>
</div>

<script src="/dashboard/shared.js"></script>
<script>
async function init() {
  const ok = await initAuth();
  if (!ok) return;
  renderNav('personal');
  loadPersonal();
}

let currentFilter = 'all';

function filterType(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadPersonal();
}

async function loadPersonal() {
  try {
    const typeParam = currentFilter !== 'all' ? `&type=${currentFilter}` : '';
    const notes = await api(`/api/personal?limit=50${typeParam}`);
    if (!notes?.length) { showEmpty('personal-list','📥','No messages yet'); return; }
    document.getElementById('personal-list').innerHTML = notes.map(n => {
      const isVoice = n.message_type === 'voice' || n.message_type === 'audio';
      const content = n.transcription || n.text_content || n.body || '';
      return `
      <div class="list-item">
        <span class="item-icon">${isVoice ? '🎙️' : '💬'}</span>
        <div class="item-body">
          <div class="item-title">
            ${esc(n.sender_name || 'Unknown')}
            ${isVoice ? `<span class="badge badge-voice">🎙 ${formatDuration(n.duration_seconds)}</span>` : ''}
            ${n.language ? langFlag(n.language) : ''}
          </div>
          <div class="item-preview" style="white-space:normal">${esc(content)}</div>
        </div>
        <span class="item-time">${timeAgo(n.timestamp)}</span>
      </div>`;
    }).join('');
  } catch (e) { showEmpty('personal-list','⚠️','Failed to load'); }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

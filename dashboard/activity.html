<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content">

      <div class="page-header animate-in">
        <h1 class="page-title">Activity</h1>
        <button class="btn btn-secondary btn-sm" onclick="loadActivity()">↻ Refresh</button>
      </div>

      <!-- Filters -->
      <div class="filter-bar animate-in animate-in-d1" id="filter-bar">
        <span class="filter-pill active" data-filter="all" onclick="setActFilter('all')">All</span>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap" class="animate-in animate-in-d1">
        <select class="input" id="type-filter" onchange="applyFilters()" style="width:auto;font-size:13px;padding:6px 12px">
          <option value="all">All types</option>
          <option value="text">Text only</option>
          <option value="voice">Voice only</option>
        </select>
      </div>

      <div id="activity-content"></div>

      <div style="text-align:center;margin-top:16px" id="load-more-wrap" style="display:none">
        <button class="btn btn-secondary" id="load-more-btn" onclick="loadMore()" style="display:none">Load more</button>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allMessages = [];
let actFilter = 'all';
let typeFilter = 'all';
let page = 1;
let groupNames = new Set();

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('activity');
  renderMobileTabs('home');
  loadActivity();
});

async function loadActivity() {
  page = 1;
  const el = document.getElementById('activity-content');
  showLoading(el);
  try {
    const data = await api(`/api/rt/activity?page=1&type=all`);
    allMessages = data.items || data || [];
    allMessages.forEach(m => { if (m.group_name) groupNames.add(m.group_name); });
    buildGroupFilters();
    renderActivity();
    document.getElementById('load-more-btn').style.display = (data.pages && data.pages > 1) ? 'inline-flex' : 'none';
  } catch (e) {
    showError(el);
  }
}

function buildGroupFilters() {
  const bar = document.getElementById('filter-bar');
  let pills = `<span class="filter-pill active" data-filter="all" onclick="setActFilter('all')">All</span>`;
  groupNames.forEach(name => {
    pills += `<span class="filter-pill" data-filter="${name}" onclick="setActFilter('${name}')">${name}</span>`;
  });
  bar.innerHTML = pills;
}

function setActFilter(f) {
  actFilter = f;
  document.querySelectorAll('#filter-bar .filter-pill').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  applyFilters();
}

function applyFilters() {
  typeFilter = document.getElementById('type-filter').value;
  renderActivity();
}

function renderActivity() {
  const el = document.getElementById('activity-content');
  let items = allMessages;

  if (actFilter !== 'all') {
    items = items.filter(m => m.group_name === actFilter);
  }
  if (typeFilter === 'text') {
    items = items.filter(m => m.message_type !== 'voice' && m.type !== 'voice');
  } else if (typeFilter === 'voice') {
    items = items.filter(m => m.message_type === 'voice' || m.type === 'voice');
  }

  if (!items.length) {
    showEmpty(el, 'No activity yet', 'Messages from your groups will appear here in real time.');
    return;
  }

  el.innerHTML = items.map(m => {
    const isVoice = m.message_type === 'voice' || m.type === 'voice';
    const text = m.text || m.message_text || m.content || m.transcription || '';
    const expanded = isVoice && text.length > 150;
    const id = m.id || Math.random().toString(36).slice(2);

    return `
      <div class="activity-item">
        ${renderAvatar(m.sender || m.sender_name || 'Unknown')}
        <div class="activity-content">
          <div class="activity-meta">
            <span class="activity-sender">${m.sender || m.sender_name || 'Unknown'}</span>
            ${m.group_name ? groupPill(m.group_name) : ''}
            <span class="activity-time">${timeAgo(m.timestamp || m.created_at)}</span>
          </div>
          <div class="activity-text">
            ${isVoice ? `<span class="voice-badge">🎤 ${formatDuration(m.duration || m.voice_duration_sec || 0)}</span> ` : ''}
            <span id="text-${id}">${expanded ? truncate(text, 150) : text}</span>
            ${expanded ? `<button class="btn-sm" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px" onclick="expandText('${id}', \`${text.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">Show more</button>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function expandText(id, fullText) {
  document.getElementById(`text-${id}`).textContent = fullText;
}

async function loadMore() {
  page++;
  try {
    const data = await api(`/api/rt/activity?page=${page}&type=all`);
    const items = data.items || data || [];
    allMessages = allMessages.concat(items);
    renderActivity();
    if (!data.pages || page >= data.pages) {
      document.getElementById('load-more-btn').style.display = 'none';
    }
  } catch (e) {
    showToast('Failed to load more');
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups — Retena</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css">
  <meta property="og:image" content="/dashboard/icons/icon-512.png">
  <link rel="icon" href="/dashboard/icons/favicon.ico">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="page-content two-panel">

      <!-- Left: Group List -->
      <div class="panel-left" id="panel-left">
        <div class="panel-left-header">
          <h2>Groups</h2>
        </div>
        <div style="padding:8px 8px 0">
          <input class="input" placeholder="Search groups…" id="group-search" oninput="filterGroups()" style="font-size:13px">
        </div>
        <div class="panel-list" id="group-list"></div>
      </div>

      <!-- Right: Group Detail -->
      <div class="panel-right hidden-mobile" id="panel-right">
        <div class="panel-empty" id="group-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p>Select a group to see details</p>
        </div>
        <div id="group-detail" style="display:none;padding:24px"></div>
      </div>

    </div>
  </div>
</div>
<nav class="mobile-tabs"><div class="mobile-tabs-inner" id="mobile-tabs"></div></nav>

<script src="/dashboard/js/shared.js"></script>
<script>
let allGroups = [];
let selectedGroupId = null;
let _groupsLastUpdated = null;

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar('groups');
  renderMobileTabs('groups');
  loadGroups();
});

// ── Background poll: refresh group list + active group detail ──
window.addEventListener('retena:newData', async (e) => {
  if (!e.detail?.hasNew) return;
  // Silently refresh the group list (message counts, last activity)
  try {
    const data = await api('/api/rt/groups');
    const items = data?.items || data?.groups || data;
    if (Array.isArray(items)) {
      allGroups = items;
      saveCachedGroups(allGroups);
      renderGroupList(document.getElementById('group-search')?.value?.toLowerCase() || '');
    }
  } catch (e) { /* silent */ }

  // If a group detail is open, refresh it without collapsing sections
  if (!selectedGroupId) return;
  try {
    const data = await api(`/api/rt/groups/${selectedGroupId}`);
    // Only update message list + stats, not the whole panel (preserve open sections)
    const msgs = data?.messages || data?.recent_messages || [];
    if (!msgs.length) return;
    const msgList = document.getElementById('group-msg-list');
    if (msgList) {
      const existingIds = new Set([...msgList.querySelectorAll('[data-id]')].map(el => el.dataset.id));
      const newMsgs = msgs.filter(m => !existingIds.has(String(m.id)));
      if (!newMsgs.length) return;

      const wasAtBottom = msgList.scrollHeight - msgList.scrollTop - msgList.clientHeight < 60;
      newMsgs.reverse().forEach(m => {
        const d = document.createElement('div');
        d.dataset.id = m.id;
        d.innerHTML = buildGroupMsgRow(m);
        msgList.appendChild(d.firstElementChild || d);
      });
      if (wasAtBottom) msgList.scrollTop = msgList.scrollHeight;
      else showNewMsgBadge(msgList, newMsgs.length, () => { msgList.scrollTop = msgList.scrollHeight; });
    }
  } catch (e) { /* silent */ }
});

// ── localStorage cache for instant render ──
const GROUPS_CACHE_KEY = 'retena_groups_list';
const GROUPS_CACHE_MAX_AGE = 5 * 60 * 1000;

function getCachedGroups() {
  try {
    const raw = localStorage.getItem(GROUPS_CACHE_KEY);
    if (!raw) return null;
    const { items, ts } = JSON.parse(raw);
    if (!items || !ts || Date.now() - ts > GROUPS_CACHE_MAX_AGE) return null;
    return items;
  } catch { return null; }
}

function saveCachedGroups(items) {
  try { localStorage.setItem(GROUPS_CACHE_KEY, JSON.stringify({ items, ts: Date.now() })); } catch {}
}

async function loadGroups() {
  const groupList = document.getElementById('group-list');

  // Phase 1: Instant render from localStorage cache
  const cached = getCachedGroups();
  if (cached && cached.length > 0) {
    allGroups = cached;
    renderGroupList(allGroups);
  } else {
    showLoading(groupList);
  }

  // Phase 2: Fetch fresh data in background
  try {
    const data = await api('/api/rt/groups');
    allGroups = data.items || data || [];
    saveCachedGroups(allGroups);
    renderGroupList(allGroups);
  } catch (e) {
    if (!cached || !cached.length) {
      showEmpty(groupList, 'Could not load groups', 'Something went wrong. Try refreshing.');
    }
  }
}

function filterGroups() {
  const q = document.getElementById('group-search').value.toLowerCase();
  const filtered = allGroups.filter(g => (g.name || g.group_name || '').toLowerCase().includes(q));
  renderGroupList(filtered);
}

function renderGroupList(groups) {
  const el = document.getElementById('group-list');
  if (!groups.length) {
    showEmpty(el, 'No groups yet', "Add Retena's number (+1 350 223-9900) to a WhatsApp group to start.", { label: 'How to connect →', href: '#' });
    return;
  }
  el.innerHTML = groups.map(g => {
    const id = g.id || g.chat_id;
    const name = g.name || g.group_name || 'Unknown Group';
    const status = g.capture_enabled === false ? 'paused' : 'active';
    const msgs = g.message_count || g.messages || 0;
    const voice = g.voice_count || g.voice_notes || 0;
    const members = g.member_count || g.members || 0;
    const lastMsg = g.last_message_at || g.last_activity || g.updated_at;
    return `
      <div class="panel-list-item${selectedGroupId === id ? ' selected' : ''}" onclick="selectGroup('${id}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">${g.emoji || '💬'}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</span>
              <span class="status-dot ${status}"></span>
            </div>
            <div style="font-size:12px;color:var(--text-muted)">${members} members · ${timeAgo(lastMsg)}</div>
          </div>
          <div style="text-align:right;font-size:11px;color:var(--text-muted)">
            <div>${msgs} msgs</div>
            <div>${voice} voice</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function selectGroup(id) {
  selectedGroupId = id;
  renderGroupList(allGroups);

  // Mobile: show detail panel
  document.getElementById('panel-left').classList.add('hidden-mobile');
  document.getElementById('panel-right').classList.remove('hidden-mobile');
  document.getElementById('group-empty').style.display = 'none';

  const detail = document.getElementById('group-detail');
  detail.style.display = 'block';
  showLoading(detail);

  try {
    const data = await api(`/api/rt/groups/${id}`);
    renderGroupDetail(data);
  } catch (e) {
    showError(detail);
  }
}

function renderGroupDetail(g) {
  const detail = document.getElementById('group-detail');
  const name = g.name || g.group_name || 'Group';
  const status = g.capture_enabled === false ? 'paused' : 'active';
  const isOn = status === 'active';
  const members = g.members || [];
  const messages = g.messages || g.recent_messages || [];

  detail.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="backToList()" style="display:none;margin-bottom:12px" id="back-btn">← Back</button>
    <div style="margin-bottom:20px">
      <h2 style="font-size:18px;font-weight:700">${name}</h2>
      <div style="font-size:13px;color:var(--text-muted);margin-top:4px">
        ${g.member_count || members.length || 0} members · Connected ${formatDate(g.connected_at || g.created_at)} · ${g.total_messages || g.message_count || 0} messages · ${g.total_voice_minutes || g.voice_minutes || 0} voice min
      </div>
    </div>

    <!-- WhatsApp button -->
    <div style="margin-bottom:16px">
      <button onclick="openGroupInWA('${g.id || g.chat_id}', this)"
        style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--whatsapp-green, #25D366);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s"
        onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Open in WhatsApp
      </button>
      <div id="group-brave-tip" style="display:none;margin-top:6px;padding:8px 10px;background:rgba(230,126,34,0.1);border-radius:8px;font-size:11px;color:var(--text-muted);line-height:1.4">
        ⚠️ <b>Brave users:</b> If WhatsApp doesn't open, <span onclick="document.getElementById('brave-steps-modal-g').style.display='flex'" style="color:var(--accent, #E67E22);text-decoration:underline;font-weight:600;cursor:pointer">tap here to fix it</span>
        <span onclick="localStorage.setItem('brave_wa_tip_dismissed','1');this.parentElement.style.display='none'" style="cursor:pointer;float:right;font-size:13px">✕</span>
      </div>
    </div>
    <!-- Brave fix modal (groups) -->
    <div id="brave-steps-modal-g" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;padding:24px" onclick="if(event.target===this)this.style.display='none'">
      <div style="background:var(--bg-card,#1e1e2e);border-radius:14px;padding:20px 18px;max-width:340px;width:100%;color:var(--text-primary,#fff);font-size:13px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.5)">
        <div style="font-size:15px;font-weight:700;margin-bottom:12px">🦁 Enable app links in Brave</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;gap:10px;align-items:flex-start"><span style="background:var(--accent, #E67E22);color:#fff;border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">1</span><span>Tap the <b>⋮ menu</b> in Brave (top right)</span></div>
          <div style="display:flex;gap:10px;align-items:flex-start"><span style="background:var(--accent, #E67E22);color:#fff;border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">2</span><span>Go to <b>Settings → Brave Shields &amp; Privacy</b></span></div>
          <div style="display:flex;gap:10px;align-items:flex-start"><span style="background:var(--accent, #E67E22);color:#fff;border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">3</span><span>Enable <b>"Allow app links to open in apps outside of Brave"</b></span></div>
          <div style="display:flex;gap:10px;align-items:flex-start"><span style="background:var(--whatsapp-green, #25D366);color:#fff;border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">✓</span><span>Come back and tap <b>Open in WhatsApp</b> again</span></div>
        </div>
        <button onclick="document.getElementById('brave-steps-modal-g').style.display='none'" style="margin-top:16px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--accent, #E67E22);color:#fff;font-weight:600;font-size:13px;cursor:pointer">Got it</button>
      </div>
    </div>

    <!-- Members -->
    <div class="card" style="margin-bottom:16px">
      <div class="collapsible-header" id="ch-members" onclick="toggleCollapsible('ch-members')">
        <span class="section-title" style="margin:0">Members (${members.length})</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="collapsible-body">
        ${members.length ? members.map(m => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            ${renderAvatar(m.name || m.phone || 'Unknown', 'sm')}
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${m.name || 'Unknown'}</div>
              <div style="font-size:11px;color:var(--text-muted)">${m.phone_masked || m.phone_hash || ''}</div>
            </div>
            <div style="font-size:11px;color:var(--text-muted);text-align:right">
              <div>${m.message_count || 0} msgs</div>
              <div>${m.voice_count || 0} voice</div>
            </div>
          </div>`).join('') : '<div style="padding:12px 0;font-size:13px;color:var(--text-muted)">No member data available</div>'}
      </div>
    </div>

    <!-- Recent Messages -->
    <div class="section-title">Recent Messages</div>
    <div id="group-messages" style="margin-bottom:16px">
      ${messages.length ? messages.map(m => `
        <div class="activity-item">
          ${renderAvatar(m.sender || m.sender_name || 'Unknown', 'sm')}
          <div class="activity-content">
            <div class="activity-meta">
              <span class="activity-sender">${m.sender || m.sender_name || 'Unknown'}</span>
              <span class="activity-time">${timeAgo(m.timestamp || m.created_at)}</span>
            </div>
            <div class="activity-text">
              ${(m.message_type === 'voice' || m.type === 'voice') ? `<span class="voice-badge">🎤 ${(m.duration || m.voice_duration_sec) > 0 ? formatDuration(m.duration || m.voice_duration_sec) : 'Voice'}</span> ` : ''}
              ${truncate(m.text || m.message_text || m.content || m.transcription || (m.message_type === 'voice' ? 'No transcription' : ''), 300)}
            </div>
          </div>
        </div>`).join('') : '<div style="padding:16px 0;font-size:13px;color:var(--text-muted)">No messages yet</div>'}
    </div>

    <!-- Reply removed — Retena is silent-capture only -->

    <!-- AI Summary -->
    ${g.summary ? `
    <div class="card" style="margin-bottom:16px">
      <div class="collapsible-header open" id="ch-summary" onclick="toggleCollapsible('ch-summary')">
        <span class="section-title" style="margin:0">AI Summary</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="collapsible-body open">
        <div class="summary-card">${g.summary}</div>
      </div>
    </div>` : ''}

    <!-- Capture Toggle -->
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-weight:600;font-size:14px">Capture</div>
        <div style="font-size:12px;color:var(--text-muted)">${isOn ? 'Actively capturing messages' : 'Capture paused — no new messages recorded'}</div>
      </div>
      <div class="toggle ${isOn ? 'on' : ''}" onclick="toggleCapture('${g.id || g.chat_id}', ${!isOn})" id="capture-toggle"></div>
    </div>

    <!-- Danger Zone -->
    <div class="danger-zone">
      <div style="font-weight:600;font-size:14px;color:var(--red);margin-bottom:8px">Disconnect group</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Remove Retena from this group. Captured data is preserved.</p>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('Disconnect this group? Captured data will be preserved.'))disconnectGroup('${g.id || g.chat_id}')">Disconnect</button>
    </div>
  `;

  // Show back button on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('back-btn').style.display = 'inline-flex';
  }
}

async function openGroupInWA(jid, btn) {
  if (!jid) return;
  const isBrave = navigator.brave || /Brave/i.test(navigator.userAgent);
  const origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Opening…';

  try {
    const data = await api(`/api/rt/group-invite/${encodeURIComponent(jid)}`);
    // chat.whatsapp.com/CODE → opens group directly (no join prompt if already a member)
    window.open(data.invite_url, '_blank');
    const tip = document.getElementById('group-brave-tip');
    if (isBrave && !localStorage.getItem('brave_wa_tip_dismissed') && tip) {
      tip.style.display = 'block';
    }
  } catch (e) {
    showToast('Could not open group — Retena must be a group admin to get the link');
  }

  btn.disabled = false;
  btn.innerHTML = origHtml;
}

function backToList() {
  document.getElementById('panel-left').classList.remove('hidden-mobile');
  document.getElementById('panel-right').classList.add('hidden-mobile');
}

// sendGroupMsg removed — Retena is silent-capture only

async function toggleCapture(id, enable) {
  try {
    await api(`/api/rt/groups/${id}/toggle`, { method: 'POST', body: JSON.stringify({ capture_enabled: enable }) });
    const toggle = document.getElementById('capture-toggle');
    toggle.classList.toggle('on', enable);
    showToast(enable ? 'Capture enabled' : 'Capture paused');
    loadGroups();
  } catch (e) {
    showToast('Failed to update capture');
  }
}

async function disconnectGroup(id) {
  try {
    await api(`/api/rt/groups/${id}/toggle`, { method: 'POST', body: JSON.stringify({ capture_enabled: false }) });
    showToast('Group disconnected');
    loadGroups();
    document.getElementById('group-detail').style.display = 'none';
    document.getElementById('group-empty').style.display = 'flex';
    backToList();
  } catch (e) {
    showToast('Failed to disconnect');
  }
}
</script>
</body>
</html>

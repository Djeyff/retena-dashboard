<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groups — Retena</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/dashboard/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  .two-panel { display:flex; gap:0; height:calc(100vh - 48px); }
  .panel-left { width:300px; background:var(--bg-card); border-right:1px solid var(--border); overflow-y:auto; flex-shrink:0; }
  .panel-right { flex:1; overflow-y:auto; padding:16px; }
  .group-card { padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .group-card:hover, .group-card.active { background:var(--bg-hover); }
  .group-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .group-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .group-meta { font-size:11px; color:var(--text-muted); }

  .toggle-chip { padding:3px 8px; border-radius:10px; border:none; font-size:10px; font-weight:600; cursor:pointer; transition:all .2s; }
  .toggle-chip.on { background:rgba(34,197,94,0.15); color:#22c55e; }
  .toggle-chip.off { background:rgba(239,68,68,0.15); color:#ef4444; }

  .detail-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .detail-title { font-size:16px; font-weight:600; }
  .detail-stats { font-size:11px; color:var(--text-muted); }

  .msg-bubble { padding:12px 14px; margin-bottom:8px; border-radius:12px; background:var(--bg-page); border:1px solid var(--border); position:relative; }
  .msg-bubble.voice { background:rgba(230,126,34,0.04); border-color:rgba(230,126,34,0.15); }
  .msg-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .msg-sender { font-size:12px; font-weight:600; color:#E67E22; }
  .msg-badges { display:flex; gap:4px; align-items:center; }
  .badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:8px; font-size:10px; }
  .badge-voice { background:rgba(230,126,34,0.12); color:#E67E22; }
  .badge-lang { background:rgba(255,255,255,0.06); color:var(--text-muted); }

  .msg-summary { background:rgba(230,126,34,0.06); border-left:3px solid rgba(230,126,34,0.4); padding:6px 10px; border-radius:0 6px 6px 0; margin-bottom:6px; font-size:11px; line-height:1.6; }
  .msg-text { font-size:12.5px; line-height:1.6; }
  .msg-text.collapsed { max-height:60px; overflow:hidden; position:relative; }
  .msg-text.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--bg-page)); }
  .msg-expand { font-size:11px; color:#E67E22; cursor:pointer; border:none; background:none; padding:2px 0; }
  .msg-time { font-size:10px; color:var(--text-dim); }

  .msg-actions { display:flex; gap:4px; margin-top:6px; }
  .act-btn { padding:3px 8px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:10px; cursor:pointer; }
  .act-btn:hover { background:var(--bg-hover); color:var(--text-primary); }

  .translate-box { background:rgba(99,102,241,0.06); border-left:3px solid rgba(99,102,241,0.3); padding:6px 10px; border-radius:0 6px 6px 0; margin-top:6px; font-size:11px; line-height:1.6; }

  .back-btn { display:none; padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:12px; cursor:pointer; margin-bottom:12px; }

  @media(max-width:768px) {
    .panel-left { width:100%; }
    .panel-right { display:none; }
    .panel-right.active { display:block; position:fixed; inset:0; z-index:200; background:var(--bg-page); padding:16px; overflow-y:auto; }
    .back-btn { display:inline-flex; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" style="padding:0">
    <div class="two-panel">
      <div class="panel-left" id="group-list"><div style="padding:20px;text-align:center"><div class="spinner"></div></div></div>
      <div class="panel-right" id="group-detail">
        <div style="text-align:center;padding:60px;color:var(--text-dim)">
          <div style="font-size:40px;margin-bottom:12px">👥</div>
          <p>Select a group to view messages</p>
        </div>
      </div>
    </div>
  </main>
  <div id="mobile-tabs"></div>
</div>
<div class="toast" id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none"></div>

<script src="/dashboard/shared.js"></script>
<script>
let allGroups = [];
let groupMsgs = {};
let expandedMsgs = new Set();
let translatedMsgs = {};
let activeGroupId = null;

async function init() {
  const ok = await initAuth();
  if (!ok) return;
  renderNav('groups');
  await loadGroups();
  const params = new URLSearchParams(location.search);
  if (params.get('id')) selectGroup(params.get('id'));
}

async function loadGroups() {
  try {
    allGroups = await api('/api/groups') || [];
    if (!allGroups.length) { showEmpty('group-list','👥','No groups yet'); return; }
    renderGroupList();
  } catch (e) { showEmpty('group-list','⚠️','Failed to load'); }
}

function renderGroupList() {
  document.getElementById('group-list').innerHTML = allGroups.map(g => {
    const on = g.capture_enabled !== false;
    const isActive = g.chat_id === activeGroupId;
    return `
    <div class="group-card ${isActive?'active':''}" id="gc-${safeChatId(g.chat_id)}">
      <div class="group-top">
        <div class="group-name" onclick="selectGroup('${esc(g.chat_id)}')">${groupIcon(g.chat_name)} ${esc(g.chat_name || g.chat_id)}</div>
        <button class="toggle-chip ${on?'on':'off'}" onclick="event.stopPropagation();toggleCapture('${esc(g.chat_id)}')" title="${on?'Capturing':'Paused'}">${on?'● ON':'○ OFF'}</button>
      </div>
      <div class="group-meta" onclick="selectGroup('${esc(g.chat_id)}')">${g.total_messages||0} msgs · ${g.voice_notes||0} voice · ${timeAgo(g.last_message)}</div>
    </div>`;
  }).join('');
}

function safeChatId(id) { return (id||'').replace(/[^a-zA-Z0-9]/g, '_'); }

async function toggleCapture(chatId) {
  try {
    const result = await api(`/api/groups/${encodeURIComponent(chatId)}/toggle`, { method: 'POST' });
    const group = allGroups.find(g => g.chat_id === chatId);
    if (group) group.capture_enabled = result.capture_enabled;
    renderGroupList();
    showToast(result.capture_enabled ? 'Capture ON' : 'Capture OFF');
  } catch (e) { showToast('Toggle failed'); }
}

async function selectGroup(chatId) {
  activeGroupId = chatId;
  renderGroupList();
  const panel = document.getElementById('group-detail');
  panel.classList.add('active');
  panel.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';

  try {
    const msgs = await api(`/api/groups/${encodeURIComponent(chatId)}/messages?limit=100`);
    groupMsgs[chatId] = msgs || [];
    const group = allGroups.find(g => g.chat_id === chatId);
    renderGroupDetail(chatId, group);
  } catch (e) {
    panel.innerHTML = '<div style="padding:40px;text-align:center;color:#888">Failed to load</div>';
  }
}

function renderGroupDetail(chatId, group) {
  const msgs = groupMsgs[chatId] || [];
  const name = group?.chat_name || chatId;
  const sorted = [...msgs].reverse();

  const panel = document.getElementById('group-detail');
  panel.innerHTML = `
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div class="detail-header">
      <div class="detail-title">${groupIcon(name)} ${esc(name)}</div>
      <div class="detail-stats">${msgs.length} messages</div>
    </div>
    <div id="msg-list">
      ${sorted.map(m => renderBubble(m, chatId)).join('')}
    </div>`;
  panel.scrollTop = panel.scrollHeight;
}

function renderBubble(m, chatId) {
  const isVoice = m.message_type === 'voice' || m.message_type === 'audio';
  const content = m.transcription || m.text_content || m.body || '';
  const isLong = content.length > 150;
  const isExpanded = expandedMsgs.has(m.id);
  const translated = translatedMsgs[m.id];

  let summaryHtml = '';
  if (m.summary) {
    const bullets = m.summary.split('\n').filter(l => l.trim()).map(l => '• ' + l.replace(/^[•\-\*]\s*/, '').trim()).join('<br>');
    summaryHtml = `<div class="msg-summary">${bullets}</div>`;
  }

  const textClass = (isLong && !isExpanded) ? 'msg-text collapsed' : 'msg-text';
  const bodyHtml = esc(content).replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

  return `
    <div class="msg-bubble ${isVoice?'voice':''}">
      <div class="msg-top">
        <div class="msg-sender">${esc(m.sender_name||'Unknown')}
          <span class="msg-badges">
            ${isVoice ? `<span class="badge badge-voice">🎙 ${formatDuration(m.duration_seconds)}</span>` : ''}
            ${m.language ? `<span class="badge badge-lang">${langFlag(m.language)}</span>` : ''}
          </span>
        </div>
        <span class="msg-time">${formatDetailTime(m.timestamp)}</span>
      </div>
      ${summaryHtml}
      <div class="${textClass}">${bodyHtml}</div>
      ${isLong ? `<button class="msg-expand" onclick="toggleMsgExpand('${m.id}','${esc(chatId)}')">${isExpanded?'▲ Less':'▼ More'}</button>` : ''}
      ${translated ? `<div class="translate-box"><span style="font-size:10px;font-weight:600;color:#818cf8">🌐 Translation</span><br>${esc(translated).replace(/\n/g,'<br>')}</div>` : ''}
      <div class="msg-actions">
        <button class="act-btn" onclick="copyBubble('${m.id}','${esc(chatId)}')">📋</button>
        <button class="act-btn" onclick="translateBubble('${m.id}','${esc(chatId)}')" id="tr-${m.id}">🌐</button>
      </div>
    </div>`;
}

function formatDetailTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function closeDetail() {
  const panel = document.getElementById('group-detail');
  panel.classList.remove('active');
  activeGroupId = null;
  renderGroupList();
}

function toggleMsgExpand(id, chatId) {
  if (expandedMsgs.has(id)) expandedMsgs.delete(id);
  else expandedMsgs.add(id);
  const group = allGroups.find(g => g.chat_id === chatId);
  renderGroupDetail(chatId, group);
}

function copyBubble(id, chatId) {
  const m = (groupMsgs[chatId]||[]).find(x => x.id === id);
  if (!m) return;
  navigator.clipboard.writeText(m.transcription || m.text_content || m.body || '').then(() => showToast('Copied!'));
}

async function translateBubble(id, chatId) {
  if (translatedMsgs[id]) { delete translatedMsgs[id]; const g = allGroups.find(x=>x.chat_id===chatId); renderGroupDetail(chatId,g); return; }
  const m = (groupMsgs[chatId]||[]).find(x => x.id === id);
  if (!m) return;
  const text = m.transcription || m.text_content || m.body || '';
  const btn = document.getElementById('tr-'+id);
  if (btn) btn.textContent = '⏳';
  try {
    const r = await api('/api/translate', { method:'POST', body:JSON.stringify({text:text.slice(0,3000)}) });
    if (r?.translation) { translatedMsgs[id] = r.translation; const g = allGroups.find(x=>x.chat_id===chatId); renderGroupDetail(chatId,g); }
  } catch(e) { showToast('Translation failed'); }
  if (btn) btn.textContent = '🌐';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
